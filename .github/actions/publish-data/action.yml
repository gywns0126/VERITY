name: 'Publish data to VERITY-data repo'
description: |
  2026-05-17 옵션 B 박힘 — gh-pages branch 폐기, 별 repo VERITY-data 로 publish.

  옛 구조 (2026-05-07 ~ 2026-05-17): main commit + gh-pages force_orphan publish
  → Vercel 가 gh-pages branch 마다 deployment trigger → Root Directory "vercel-api" 부재
  → ERROR 폭주 (~500/일, 5/13 Shohei 직접 메일).

  새 구조 (2026-05-17 ~): main commit + VERITY-data repo main branch force_orphan publish
  → Vercel verity-api project = VERITY repo 만 매핑, VERITY-data 와 무관 → trigger 0 → ERROR 0.

  Frontend (Framer) fetch URL = raw.githubusercontent.com/gywns0126/VERITY-data/main/<file>.

inputs:
  github_token:
    description: 'GITHUB_TOKEN (VERITY repo) — checkout 용. external publish 는 personal_token 사용.'
    required: true
  personal_token:
    description: 'Fine-grained PAT (VERITY_DATA_PAT) — VERITY-data repo write contents 권한.'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Stage public data (always from main HEAD)
      shell: bash
      run: |
        rm -rf _public_dist
        mkdir -p _public_dist
        # force_orphan race 가드 — working copy 가 다른 builder 산출물에 대해 outdated 일 수
        # 있음. main HEAD fetch 후 main 의 data/ 에서 직접 추출 → 항상 최신 publish.
        git fetch origin main --depth=1 --quiet
        for f in portfolio.json recommendations.json consensus_data.json \
                 system_health_snapshot.json \
                 macro_snapshot.json \
                 price_pulse.json; do
          if git show "origin/main:data/$f" > "_public_dist/$f" 2>/dev/null && [ -s "_public_dist/$f" ]; then
            echo "  + data/$f"
          else
            rm -f "_public_dist/$f"
            echo "  - data/$f (not in main HEAD)"
          fi
        done

        # ── price_pulse inline merge (2026-05-11) ──
        # frontend(Framer)는 portfolio.json 만 fetch 하므로 publish 단계에서 inline merge.
        # 결과: portfolio.market_summary.indices_pulse + holdings/recommendations current_price 가 1분 fresh.
        # pulse 미존재/stale 시 silent skip — portfolio 원본 유지.
        if [ -s "_public_dist/price_pulse.json" ] && [ -s "_public_dist/portfolio.json" ]; then
          python3 "${{ github.action_path }}/merge_pulse.py" \
            _public_dist/portfolio.json _public_dist/price_pulse.json
        fi

        # ── equity_research/ 디렉토리 publish (2026-05-16) ──
        # EquityBriefCard Framer 컴포넌트가 raw.githubusercontent VERITY-data main 에서 fetch.
        mkdir -p _public_dist/equity_research
        for f in $(git ls-tree --name-only origin/main:data/equity_research 2>/dev/null); do
          if git show "origin/main:data/equity_research/$f" > "_public_dist/equity_research/$f" 2>/dev/null && [ -s "_public_dist/equity_research/$f" ]; then
            echo "  + data/equity_research/$f"
          else
            rm -f "_public_dist/equity_research/$f"
          fi
        done

        # ── README.md (VERITY-data repo 메타 — 자동 readme) ──
        cat > _public_dist/README.md <<'READMEEOF'
        # VERITY-data

        VERITY 의 frontend serving data snapshots. Auto-published from
        [gywns0126/VERITY](https://github.com/gywns0126/VERITY) via publish-data action.

        - **Read-only consumer** — direct push 금지
        - **force_orphan main branch** — history 1개
        - **Raw URL pattern**: `https://raw.githubusercontent.com/gywns0126/VERITY-data/main/<file>`
        - **Frontend (Framer)**: portfolio.json / recommendations.json / macro_snapshot / price_pulse / 등 fetch (corp 자산주는 live API endpoint)
        READMEEOF

        # 2026-05-17 14:10 KST 임시 hybrid 박힘 — gh-pages 도 publish 유지 (Framer 재paste 5/18 까지).
        # _public_dist/vercel.json = Vercel 가 gh-pages clone 시 root 차단 시도 (Layer 1).
        # heredoc content = python -c 로 박음 (YAML parser indent 결함 회피 — JSON 의 0 column 박힘 시
        # YAML 가 run: | block 끝 인식 → 새 key 로 해석 → "could not find expected ':'").
        python3 -c "import json; open('_public_dist/vercel.json','w').write(json.dumps({'buildCommand':'echo gh-pages publish — no build (data snapshot only, transitional)','outputDirectory':'.','framework':None,'git':{'deploymentEnabled':{'gh-pages':False}}}, indent=2))"

        # 산출물 매니페스트 (디버깅용)
        ls -lh _public_dist/ > _public_dist/_manifest.txt
        echo "Published at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> _public_dist/_manifest.txt
        echo "Source ref: $(git rev-parse origin/main)" >> _public_dist/_manifest.txt
        ls -lh _public_dist/

    - name: Deploy to VERITY-data main branch (옵션 B, P0)
      # 2026-05-17 옵션 B — external_repository + personal_token (cross-repo write).
      # peaceiris/actions-gh-pages v4 spec: external_repository = "<owner>/<repo>".
      # publish_branch = main (VERITY-data 의 default). force_orphan = true (history 1개).
      uses: peaceiris/actions-gh-pages@v4
      with:
        personal_token: ${{ inputs.personal_token }}
        external_repository: gywns0126/VERITY-data
        publish_dir: ./_public_dist
        publish_branch: main
        force_orphan: true
        user_name: 'AI Stock Bot'
        user_email: 'bot@ansim.ai'
        commit_message: 'publish: data snapshot ${{ github.sha }}'

    - name: Deploy to gh-pages branch (transitional, 5/18 Framer 재paste 완료 후 제거)
      # 2026-05-17 14:10 KST 임시 hybrid 박힘 — Framer 25 컴포넌트 재paste 의무 (옵션 B raw URL
      # `VERITY-data/main/...` 정합) 가 5/18 사용자 작업 시 박힐 예정. 그동안 사이트 데이터 갱신
      # 멈춤 방지 위해 옛 gh-pages 도 publish 유지.
      #
      # ERROR 알림 위험: Vercel 가 gh-pages branch deploy trigger → Root Directory "vercel-api" 부재 ERROR.
      # 차단 layer (모두 시도, 작동 보장 의문):
      #   1. Dashboard Ignored Build Step (사용자 5/17 박음): exit 0 on gh-pages branch
      #   2. vercel-api/vercel.json ignoreCommand (commit 9914d47d): main vercel-api/ 외부 commit 차단
      #   3. _public_dist/vercel.json (이번 step 박는 거): gh-pages root publish 시 박힘
      #
      # if: always() — main publish (옵션 B) 가 fail 해도 gh-pages publish 시도 (사이트 보호 우선)
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ inputs.github_token }}
        publish_dir: ./_public_dist
        publish_branch: gh-pages
        force_orphan: true
        user_name: 'AI Stock Bot'
        user_email: 'bot@ansim.ai'
        commit_message: 'publish: data snapshot ${{ github.sha }} (gh-pages transitional)'
