name: 'Publish data to VERITY-data repo'
description: |
  2026-05-17 옵션 B 확정 — gh-pages branch 폐기, 별 repo VERITY-data 로 publish.
  2026-05-23 토 sprint — transitional gh-pages step 제거 (Batch C1).

  옛 구조 (2026-05-07 ~ 2026-05-17): main commit + gh-pages force_orphan publish
  → Vercel 가 gh-pages branch 마다 deployment trigger → Root Directory "vercel-api" 부재
  → ERROR 폭주 (~500/일, 5/13 Shohei 직접 메일).

  과도기 hybrid (2026-05-17 ~ 2026-05-23): VERITY-data + gh-pages 둘 다 publish (Framer 재paste 보호).

  새 구조 (2026-05-23 ~): VERITY-data repo main 만 publish.
  → Vercel verity-api project = VERITY repo 만 매핑, VERITY-data 와 무관 → trigger 0 → ERROR 0.

  Frontend (Framer) fetch URL = raw.githubusercontent.com/gywns0126/VERITY-data/main/<file>.
  Backend (vercel-api/api/*) fetch default URL = 동일 (5/23 정정).

inputs:
  github_token:
    description: 'DEPRECATED (2026-05-23 Batch C1) — 옛 gh-pages publish 용. 미사용. 워크플로 6건 caller backwards-compat 위해 input 보존.'
    required: false
  personal_token:
    description: 'Fine-grained PAT (VERITY_DATA_PAT) — VERITY-data repo write contents 권한.'
    required: true
  blob_token:
    description: '2026-05-24 private repo migration prep — Vercel Blob (BLOB_READ_WRITE_TOKEN). 빈 값이면 dual-write skip (기존 흐름 안 깨짐).'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Stage public data (always from main HEAD)
      shell: bash
      run: |
        rm -rf _public_dist
        mkdir -p _public_dist
        # force_orphan race 가드 — working copy 가 다른 builder 산출물에 대해 outdated 일 수
        # 있음. main HEAD fetch 후 main 의 data/ 에서 직접 추출 → 항상 최신 publish.
        git fetch origin main --depth=1 --quiet
        # 2026-05-24 private repo migration — 추가 5 파일 (admin_todos / brain_kb_usage /
        # history / metadata/cron_health.jsonl / metadata/data_pipeline_health.json).
        # 기존엔 Framer 가 VERITY 본 repo public 으로 직접 페치. private 전환 후 죽기 때문에
        # publish-data 에 합쳐 Blob + VERITY-data 양쪽 모두 publish.
        # 🚫 us_analyst_consensus.json 재추가 금지 (PM 확정 2026-07-10) — 컨센서스 = 발행 제외.
        #   yfinance 목표가·투자의견 = Benzinga/S&P 실권리(재배포 blocker, 권리감사 쟁점3).
        #   대체 = 리포트 내 출처 링크아웃(구현 완료) · 숫자 부활 = 유료 티어 Polygon×Benzinga
        #   정식 라이선스($99/월) 계약 후에만. 세션 간 재추가 핑퐁 2회(9c8397eea·414ff9431) —
        #   이 결정 변경 = PM 재승인 + memory(project_kr_index_public_data_2026_07_08) 갱신 필수.
        for f in portfolio.json recommendations.json consensus_data.json \
                 system_health_snapshot.json \
                 macro_snapshot.json \
                 crypto_macro.json \
                 crypto_universe.json \
                 crypto_news.json \
                 crypto_defillama.json \
                 crypto_governance.json \
                 crypto_etf_flow.json \
                 crypto_options.json \
                 crypto_stablecoins.json \
                 crypto_positioning.json \
                 crypto_trends.json \
                 crypto_regime.json \
                 price_pulse.json \
                 bonds.json \
                 kr_stock_names.json \
                 admin_todos.json \
                 brain_kb_usage.json \
                 ipo_watch.json \
                 nps_holdings.json \
                 nps_fund_returns.json \
                 nps_employment.json \
                 securities_lending.json \
                 public_disclosure_feed.json \
                 validation_summary.json \
                 stock_report_public.json \
                 us_stock_report_public.json \
                 us_quarterly_public.json \
                 dart_quarterly_public.json \
                 us_disclosure_feed.json \
                 stock_flow_5d.json \
                 sector_overview.json \
                 entrance_map.json \
                 freshness_board.json \
                 kr_index_daily.json \
                 hot_stock.json \
                 perspective_maps.json \
                 daily_briefing.json \
                 kr_earnings_pattern.json \
                 us_earnings_pattern.json \
                 supply_demand.json \
                 disclosure_forensics.json \
                 kr_forensics_public.json \
                 insider_trades.json \
                 us_insider_trades.json \
                 us_major_holdings.json \
                 us_smart_money_13f.json \
                 commodity_exposure.json \
                 market_warnings.json \
                 smallcap_corner_filters.json \
                 us_smallcap_corner_filters.json \
                 us_stock_report_us_smallcap.json \
                 broker_guide.json \
                 etf_flow.json \
                 universe_search_kr.json \
                 universe_search.json \
                 ai_synthesis.json \
                 event_study.json \
                 history.json; do
          if git show "origin/main:data/$f" > "_public_dist/$f" 2>/dev/null && [ -s "_public_dist/$f" ]; then
            echo "  + data/$f"
          else
            rm -f "_public_dist/$f"
            echo "  - data/$f (not in main HEAD)"
          fi
        done

        # ── metadata/ subdir (SystemHealthBar / OperatorCockpitBar 의 source) ──
        # 2026-05-27: cockpit_state.json 추가 (Cockpit Phase 0 산출 SoT, 5분 cron).
        # 2026-06-07: system_map.json 추가 (SystemMap "한눈에 보기" 구조 SoT, cockpit cron 동반 생성).
        mkdir -p _public_dist/metadata
        for f in data_pipeline_health.json cron_health.jsonl cockpit_state.json system_map.json; do
          if git show "origin/main:data/metadata/$f" > "_public_dist/metadata/$f" 2>/dev/null && [ -s "_public_dist/metadata/$f" ]; then
            echo "  + data/metadata/$f"
          else
            rm -f "_public_dist/metadata/$f"
            echo "  - data/metadata/$f (not in main HEAD)"
          fi
        done

        # ── arena/ subdir (ARENA 버서커 status 카드 source) ──
        # 2026-06-09: 버서커 검증 진행도 status + shadow 채점 score 발행 (PM 6/8 부활).
        # data/arena/* 는 gitignore + 버서커 3파일만 카브 추적 — main HEAD tracked 파일만 publish.
        # asset_stats(μ/σ 엣지)는 비추적이라 자동 제외 (비공개 유지). shadow.jsonl(원시 trail)은
        # 카드 불필요 — status + score 2파일만 발행 (카드 = 진행도 + 카운트다운).
        mkdir -p _public_dist/arena
        for f in berserker_status.json berserker_shadow_score.json; do
          if git show "origin/main:data/arena/$f" > "_public_dist/arena/$f" 2>/dev/null && [ -s "_public_dist/arena/$f" ]; then
            echo "  + data/arena/$f"
          else
            rm -f "_public_dist/arena/$f"
            echo "  - data/arena/$f (not in main HEAD)"
          fi
        done

        # ── price_pulse inline merge (2026-05-11) ──
        # frontend(Framer)는 portfolio.json 만 fetch 하므로 publish 단계에서 inline merge.
        # 결과: portfolio.market_summary.indices_pulse + holdings/recommendations current_price 가 1분 fresh.
        # pulse 미존재/stale 시 silent skip — portfolio 원본 유지.
        if [ -s "_public_dist/price_pulse.json" ] && [ -s "_public_dist/portfolio.json" ]; then
          python3 "${{ github.action_path }}/merge_pulse.py" \
            _public_dist/portfolio.json _public_dist/price_pulse.json
        fi

        # ── bonds inline merge (2026-06-03) ──
        # bonds 를 별도 파일(data/bonds.json, 단일 writer)로 분리 → race 회피.
        # publish 시점에 portfolio.bonds 를 bonds.json 으로 갱신 → 컴포넌트가 보는 채권 항상 fresh.
        if [ -s "_public_dist/bonds.json" ] && [ -s "_public_dist/portfolio.json" ]; then
          python3 "${{ github.action_path }}/merge_bonds.py" \
            _public_dist/portfolio.json _public_dist/bonds.json
        fi

        # ── equity_research/ 디렉토리 publish (2026-05-16) ──
        # EquityBriefCard Framer 컴포넌트가 raw.githubusercontent VERITY-data main 에서 fetch.
        mkdir -p _public_dist/equity_research
        for f in $(git ls-tree --name-only origin/main:data/equity_research 2>/dev/null); do
          if git show "origin/main:data/equity_research/$f" > "_public_dist/equity_research/$f" 2>/dev/null && [ -s "_public_dist/equity_research/$f" ]; then
            echo "  + data/equity_research/$f"
          else
            rm -f "_public_dist/equity_research/$f"
          fi
        done

        # ── us_financials/ 디렉토리 publish (2026-05-26 확정 — private 전환 sweep 보완) ──
        # USFinancialsCard 가 /api/verity/us-financials → vercel-api/api/us_financials.py
        # → Blob /us_financials/_summary.json + per-ticker {TICKER}.json fetch.
        # 5/24 e916ea7b stale URL sweep 누락 fix. [[project_us_financials_sec_edgar]].
        mkdir -p _public_dist/us_financials
        for f in $(git ls-tree --name-only origin/main:data/us_financials 2>/dev/null); do
          if git show "origin/main:data/us_financials/$f" > "_public_dist/us_financials/$f" 2>/dev/null && [ -s "_public_dist/us_financials/$f" ]; then
            echo "  + data/us_financials/$f"
          else
            rm -f "_public_dist/us_financials/$f"
          fi
        done

        # ── kr_chart_daily/ = 공용 staging 제외 (2026-07-07 구조 변경) ──
        # 옛 구조(7/4~7/7): 여기서 41파일 28MB 를 매 호출자마다 직렬 Blob PUT
        # → price_pulse publish +68s → run 6분 > dispatch 간격 5분 → 큐 취소 연쇄
        # (cron_health dispatch_chain ratio 22% FAIL, 2026-07-07 진단).
        # 새 구조: kr_chart_daily.yml 이 갱신 시점(평일 1회)에만 Blob 직행 업로드
        # (kr_chart_history.yml 과 동일 패턴). 소비자 = PublicLiveChart Blob fetch only —
        # VERITY-data 사본은 force_orphan 에서 자연 제거 (raw 소비자 0 확인, 무해).

        # ── README.md (VERITY-data repo 메타 — 자동 readme) ──
        cat > _public_dist/README.md <<'READMEEOF'
        # VERITY-data

        VERITY 의 frontend serving data snapshots. Auto-published from
        [gywns0126/VERITY](https://github.com/gywns0126/VERITY) via publish-data action.

        - **Read-only consumer** — direct push 금지
        - **force_orphan main branch** — history 1개
        - **Raw URL pattern**: `https://raw.githubusercontent.com/gywns0126/VERITY-data/main/<file>`
        - **Frontend (Framer)**: portfolio.json / recommendations.json / macro_snapshot / price_pulse / 등 fetch (corp 자산주는 live API endpoint)
        READMEEOF

        # 산출물 매니페스트 (디버깅용)
        ls -lh _public_dist/ > _public_dist/_manifest.txt
        echo "Published at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> _public_dist/_manifest.txt
        echo "Source ref: $(git rev-parse origin/main)" >> _public_dist/_manifest.txt
        ls -lh _public_dist/

    - name: Deploy to VERITY-data main branch (옵션 B, P0)
      # 2026-05-17 옵션 B — external_repository + personal_token (cross-repo write).
      # peaceiris/actions-gh-pages v4 spec: external_repository = "<owner>/<repo>".
      # publish_branch = main (VERITY-data 의 default). force_orphan = true (history 1개).
      uses: peaceiris/actions-gh-pages@v4
      with:
        personal_token: ${{ inputs.personal_token }}
        external_repository: gywns0126/VERITY-data
        publish_dir: ./_public_dist
        publish_branch: main
        force_orphan: true
        user_name: 'AI Stock Bot'
        user_email: 'bot@ansim.ai'
        commit_message: 'publish: data snapshot ${{ github.sha }}'

    - name: Dual-write to Vercel Blob (private repo migration prep)
      # 2026-05-24 — private repo 전환 cutover 0-down 위한 dual-write.
      # blob_token 빈 값이면 silent skip (기존 흐름 유지). Pro 계정 Blob 포함 한도 안.
      # Framer dataUrl 일괄 치환 후 → gh repo edit --visibility private 1회 flip.
      shell: bash
      env:
        BLOB_READ_WRITE_TOKEN: ${{ inputs.blob_token }}
      run: |
        if [ -z "$BLOB_READ_WRITE_TOKEN" ]; then
          echo "blob_token not set — dual-write skip"
          exit 0
        fi
        cd "${{ github.action_path }}"
        # @vercel/blob SDK 캐시 회피 위해 npm pack 없이 --no-save
        npm install --no-save --silent --no-audit --no-fund @vercel/blob@^0.27 || {
          echo "::warning::@vercel/blob install fail — skip"
          exit 0
        }
        node blob_upload.js "${{ github.workspace }}/_public_dist"

