name: Stock Analysis Pipeline (Full & Periodic)

# Full/Full_US/periodic_* 모드 전용 워크플로.
# realtime/quick cron(daily_analysis.yml)과 concurrency group 을 분리해서
# 5~10분마다 도는 경량 cron 이 35분짜리 full 실행을 cancel 하지 못하게 한다.

on:
  schedule:
    # 장 마감 full 분석 (KST 16:00 = UTC 07:00), 월~금
    - cron: '7 7 * * 1-5'
    # 미장 마감 full 분석 KST 06:30 (UTC 21:30), 화~금
    # 2026-05-18 fix: 옛 '2-6' (Tue-Sat UTC) 결함 — Sat UTC = KST Sun 06:30 = US 미장
    # 휴장 + KRX 일요일 휴장 = 분석할 세션 0 + KRX 빈 JSON 무한 fail. cron 자체 false trigger.
    # '2-5' (Tue-Fri UTC) = 각각 Wed/Thu/Fri/Sat KST 06:30 = 정상 post-US 마감 분석.
    - cron: '30 21 * * 2-5'
    # 주간 리포트: 매주 토요일 KST 09:00 (UTC 00:00)
    - cron: '7 0 * * 6'
    # 월간 리포트: 매월 1일 KST 09:00 (UTC 00:00)
    - cron: '7 0 1 * *'
    # 분기 리포트: 1/4/7/10월 2일 KST 10:00 (UTC 01:00)
    - cron: '7 1 2 1,4,7,10 *'
    # 반기 리포트: 1/7월 3일 KST 10:00 (UTC 01:00)
    - cron: '7 1 3 1,7 *'
    # 연간 리포트: 1월 4일 KST 10:00 (UTC 01:00)
    - cron: '7 1 4 1 *'
  # 2026-05-18 — Vercel Cron fallback (GitHub Actions schedule silent miss 회피).
  # vercel-api/api/cron/dispatch_pulse.py 가 매분 KST 16:07 / 06:30 시각 매핑 → repository_dispatch.
  repository_dispatch:
    types:
      - daily_analysis_full
  workflow_dispatch:
    inputs:
      mode:
        description: '분석 모드 (full / full_us / periodic_daily / periodic_weekly / periodic_monthly / periodic_quarterly / periodic_semi / periodic_annual)'
        required: false
        default: 'full'
        type: string
      verity_mode:
        description: 'VERITY_MODE (LLM 호출 정책). manual dispatch default = staging (cost 격리). 운영 검증 필요시 prod.'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - prod
          - dev

# Node.js 24 강제 — 2026-06-02 GitHub Node 20 deprecation 대비 (2026-05-07)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

# WARN-17: data/* 쓰기 워크플로 단일 그룹 직렬화 (realtime/quick/bond_etf/export_trade 공유).
# cancel-in-progress: false → full/realtime 이 동시에 매치되면 큐잉.
concurrency:
  group: verity-data-write
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # B-3: brain_evolution.collect_evolution_log 가 git log 30 commit 분석 필요
          fetch-depth: 100

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 현재 날짜 (KST)
        id: date
        run: echo "today=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: KIS 토큰 캐시 복원 (하루 1회 재발급 보장)
        uses: actions/cache@v4
        with:
          path: ~/.cache/verity_kis_token.json
          key: kis-token-v2-${{ runner.os }}-${{ steps.date.outputs.today }}
          restore-keys: |
            kis-token-v2-${{ runner.os }}-

      - name: Check optional trade/patent API secrets
        env:
          KIPRIS_API_KEY: ${{ secrets.KIPRIS_API_KEY || vars.KIPRIS_API_KEY }}
          KIPRIS_ACCESS_KEY: ${{ secrets.KIPRIS_ACCESS_KEY || vars.KIPRIS_ACCESS_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY || vars.PUBLIC_DATA_API_KEY }}
        run: |
          if [ -z "$KIPRIS_API_KEY" ] && [ -z "$KIPRIS_ACCESS_KEY" ]; then
            echo "::warning::KIPRIS: KIPRIS_API_KEY 또는 KIPRIS_ACCESS_KEY 없음"
          fi
          if [ -z "$PUBLIC_DATA_API_KEY" ]; then
            echo "::warning::관세청: PUBLIC_DATA_API_KEY 없음"
          fi
          KRX_API_KEY="${{ secrets.KRX_API_KEY || vars.KRX_API_KEY }}"
          if [ -z "$KRX_API_KEY" ]; then
            echo "::warning::KRX: KRX_API_KEY 없음 → docs/KRX_OPEN_API_SETUP.md"
          fi

      - name: Ensure Korean font for PDF
        run: |
          mkdir -p api/reports/fonts
          if [ ! -f api/reports/fonts/NanumGothic.ttf ]; then
            curl -sL -o api/reports/fonts/NanumGothic.ttf \
              "https://github.com/google/fonts/raw/main/ofl/nanumgothic/NanumGothic-Regular.ttf"
            curl -sL -o api/reports/fonts/NanumGothicBold.ttf \
              "https://github.com/google/fonts/raw/main/ofl/nanumgothic/NanumGothic-Bold.ttf"
          fi

      - name: Detect periodic schedule
        id: detect_mode
        run: |
          CRON="${{ github.event.schedule }}"
          MANUAL="${{ github.event.inputs.mode }}"
          DAY_OF_MONTH=$(TZ=Asia/Seoul date +%d)
          if [ -n "$MANUAL" ]; then
            echo "mode=$MANUAL" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "7 1 4 1 *" ]; then
            echo "mode=periodic_annual" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "7 1 3 1,7 *" ]; then
            echo "mode=periodic_semi" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "7 1 2 1,4,7,10 *" ]; then
            echo "mode=periodic_quarterly" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "7 0 1 * *" ] || ([ "$CRON" = "7 0 * * 6" ] && [ "$DAY_OF_MONTH" = "01" ]); then
            echo "mode=periodic_monthly" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "7 0 * * 6" ]; then
            echo "mode=periodic_weekly" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "7 7 * * 1-5" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "30 21 * * 2-5" ]; then
            echo "mode=full_us" >> $GITHUB_OUTPUT
          else
            echo "mode=full" >> $GITHUB_OUTPUT
          fi

      # KIS [C] 보강 (commit bac4ec2 재활성화 조건) —
      # KIS 토큰을 분석 시작 전에 발급하고 daily lock 을 즉시 push.
      # 기존 흐름: analysis step (28분) 안에서 발급 → 끝나야 commit/push 발생.
      #           그 사이 KIS Token Refresh cron 이 stale lock 보고 재발급 위험 (5/3 사고 원인).
      # 본 step: lock 파일을 ~수초 안에 origin 에 push → 다음 cron 의 fresh checkout 이 즉시 인지.
      - name: KIS preflight (issue + immediate lock push)
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_OPENAPI_BASE_URL: ${{ secrets.KIS_OPENAPI_BASE_URL || vars.KIS_OPENAPI_BASE_URL }}
        run: |
          if [ -z "$KIS_APP_KEY" ]; then
            echo "[KIS preflight] secrets 미설정 — skip"
            exit 0
          fi
          python - <<'PYEOF'
          import sys, os
          sys.path.insert(0, os.getcwd())
          try:
              from api.trading.kis_broker import KISBroker
              broker = KISBroker()
              if not broker.is_configured:
                  print("[KIS preflight] 미설정 — skip")
                  sys.exit(0)
              # 2026-05-13 자정 race fix: date 비교 → 시각 기반 23h interval
              if broker._is_recently_issued(hours=23):
                  print("[KIS preflight] 23h 이내 발급 — skip")
                  sys.exit(0)
              # force_refresh=False — broker 23h interval 가드 (자정 race 차단) 작동
              token = broker.authenticate(force_refresh=False)
              print(f"[KIS preflight] 발급 완료: {token[:8]}***")
          except Exception as e:
              # silent — 본 analysis step 에서 재시도 가능
              print(f"[KIS preflight] 실패 (analysis step 에서 재시도): {e}")
              sys.exit(0)
          PYEOF

      - name: Daily lock immediate push (KIS [C])
        if: always()
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
        run: |
          if [ -z "$KIS_APP_KEY" ]; then
            echo "[lock push] KIS 미설정 — skip"
            exit 0
          fi
          if [ ! -f data/.kis_issued_date.txt ]; then
            echo "[lock push] 파일 없음 — preflight 발급 skip 케이스. 종료"
            exit 0
          fi
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/.kis_issued_date.txt
          if git diff --staged --quiet; then
            echo "[lock push] 변화 없음 — origin 이미 동기"
            exit 0
          fi
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "🔐 KIS daily lock ${TODAY} (preflight)"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              echo "[lock push] ✓ 성공 (시도 $i)"
              exit 0
            fi
            echo "[lock push] 시도 $i 실패 — 재시도"
            sleep $((i * 5))
          done
          echo "::warning::[lock push] 3회 실패 — 분석 끝 commit step 에서 재시도"

      - name: Run analysis
        env:
          # 2026-05-11: VERITY_MODE 명시 — schedule cron = prod, manual dispatch = input (default staging).
          # cost 감축 (개발 manual 호출 시 LLM 자동 mock).
          VERITY_MODE: ${{ github.event.inputs.verity_mode || 'prod' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
          VAMS_INITIAL_CASH: ${{ vars.VAMS_INITIAL_CASH || '10000000' }}
          VAMS_MAX_PER_STOCK: ${{ vars.VAMS_MAX_PER_STOCK || '2000000' }}
          ANALYSIS_MODE: ${{ steps.detect_mode.outputs.mode }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          KIPRIS_API_KEY: ${{ secrets.KIPRIS_API_KEY || vars.KIPRIS_API_KEY }}
          KIPRIS_ACCESS_KEY: ${{ secrets.KIPRIS_ACCESS_KEY || vars.KIPRIS_ACCESS_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY || vars.PUBLIC_DATA_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY || vars.KRX_API_KEY }}
          KRX_OPENAPI_KEY: ${{ secrets.KRX_API_KEY || vars.KRX_API_KEY }}
          # Phase 2-A — 유니버스 ramp-up (결정 4). secrets 미설정 시 빈 문자열 → config.py default 500.
          # UNIVERSE_RAMP_UP_AUTO 는 워크플로 미주입 — config.py default False 유지 (자동 ramp-up 금지).
          UNIVERSE_RAMP_UP_STAGE: ${{ secrets.UNIVERSE_RAMP_UP_STAGE }}
          # Phase 2-B — wide_scan shadow mode. 2026-05-18 PM 옵션 C 결정 박힘 — SHADOW default.
          # 활성값: SHADOW (jsonl 적재만) / CANARY_5 (5%만 적용 — step d) / PRODUCTION (전면 — 65 거래일 검증 후)
          # PRODUCTION 게이트 = 자기 산식 8/10 + 학술 N≥30 둘 다 통과.
          WIDE_SCAN_MODE: ${{ vars.WIDE_SCAN_MODE || secrets.WIDE_SCAN_MODE || 'SHADOW' }}
          GEMINI_MODEL_CRITICAL: ${{ vars.GEMINI_MODEL_CRITICAL || 'gemini-2.5-pro' }}
          GEMINI_PRO_ENABLE: ${{ vars.GEMINI_PRO_ENABLE || '1' }}
          GEMINI_CRITICAL_TOP_N: ${{ vars.GEMINI_CRITICAL_TOP_N || '3' }}
          CLAUDE_MODEL_LIGHT: ${{ vars.CLAUDE_MODEL_LIGHT || 'claude-haiku-4-5' }}
          CLAUDE_MODEL_DEFAULT: ${{ vars.CLAUDE_MODEL_DEFAULT || 'claude-sonnet-4-6' }}
          CLAUDE_MODEL_HEAVY: ${{ vars.CLAUDE_MODEL_HEAVY || 'claude-opus-4-7' }}
          CLAUDE_OPUS_ENABLE: ${{ vars.CLAUDE_OPUS_ENABLE || '1' }}
          CLAUDE_TOP_N: ${{ vars.CLAUDE_TOP_N || '2' }}
          CLAUDE_MIN_BRAIN_SCORE: ${{ vars.CLAUDE_MIN_BRAIN_SCORE || '70' }}
          CLAUDE_IN_QUICK: ${{ vars.CLAUDE_IN_QUICK || '0' }}
          CLAUDE_IN_REALTIME: ${{ vars.CLAUDE_IN_REALTIME || '0' }}
          CLAUDE_QUICK_TOP_N: ${{ vars.CLAUDE_QUICK_TOP_N || '1' }}
          CLAUDE_EMERGENCY_THRESHOLD_PCT: ${{ vars.CLAUDE_EMERGENCY_THRESHOLD_PCT || '5.0' }}
          CLAUDE_EMERGENCY_COOLDOWN_MIN: ${{ vars.CLAUDE_EMERGENCY_COOLDOWN_MIN || '120' }}
          CLAUDE_TAIL_RISK_VERIFY: ${{ vars.CLAUDE_TAIL_RISK_VERIFY || '0' }}
          CLAUDE_MORNING_STRATEGY: ${{ vars.CLAUDE_MORNING_STRATEGY || '0' }}
          DEADMAN_FAIL_THRESHOLD: ${{ vars.DEADMAN_FAIL_THRESHOLD || '3' }}
          REPORT_SEND_HOUR_KST: ${{ vars.REPORT_SEND_HOUR_KST || '16' }}
          REPORT_SEND_MINUTE_KST: ${{ vars.REPORT_SEND_MINUTE_KST || '30' }}
          POSTMORTEM_ENABLED: ${{ vars.POSTMORTEM_ENABLED || '1' }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          POLYGON_TIER: ${{ vars.POLYGON_TIER || 'free' }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWSAPI_MAX_ARTICLES: ${{ vars.NEWSAPI_MAX_ARTICLES || '5' }}
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_OPENAPI_BASE_URL: ${{ secrets.KIS_OPENAPI_BASE_URL || vars.KIS_OPENAPI_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
          # SERVICE_ROLE_KEY: api/health.py _check_reports_signed_url 가 signed URL 발급 검증할 때 필요 (write 권한).
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python api/main.py

      - name: Brain audit baseline (PRE/POST 측정 영속화)
        # 2026-05-18 박힘 — docs/BRAIN_SCORE_AUDIT_20260518.md audit cycle 영속화.
        # portfolio.json 의 brain_score 분포 + component fill + grade + quadrant 측정.
        # 결과: data/metadata/brain_audit.jsonl append (다음 step 의 git add data/ 자동 포함).
        # fail 시 workflow continue (continue-on-error: true).
        continue-on-error: true
        run: python scripts/audit_brain_score_baseline.py

      - name: Brain audit telegram push (자리 비움 시 핸드폰 알림)
        # 2026-05-18 c-fix — workflow 자체 telegram push (Engineer wait/cron 의존 회피).
        # send_message 가 quiet hours (23:00~07:00 KST) + dedupe 자동 정합.
        # 16:07 KST 평일 daily_full = 통과 / 06:30 KST = quiet hours suppress.
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_QUIET_HOURS_ENABLED: ${{ vars.TELEGRAM_QUIET_HOURS_ENABLED || '1' }}
        run: python scripts/push_brain_audit_telegram.py

      - name: Commit & push results
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/
          HOUR_KST=$(TZ=Asia/Seoul date +%H:%M)
          MODE="${{ steps.detect_mode.outputs.mode }}"
          if [[ "$MODE" == periodic_* ]]; then
            LABEL=$(echo "$MODE" | sed 's/periodic_//')
            git diff --staged --quiet || git commit -m "📋 ${LABEL} 리포트 $(TZ=Asia/Seoul date +%Y-%m-%d)"
          else
            git diff --staged --quiet || git commit -m "📊 [${MODE}] 분석 업데이트 $(TZ=Asia/Seoul date +%Y-%m-%d) ${HOUR_KST}"
          fi
          BRANCH="${{ github.ref_name }}"
          PUSHED=false
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            git merge --abort 2>/dev/null || true
            if git pull --rebase -X theirs origin "$BRANCH" && git push origin "$BRANCH"; then
              PUSHED=true
              break
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::error::All 5 push attempts failed"
            exit 1
          fi

      - name: Publish hot data to VERITY-data
        # Phase A: dual-write — main 에도 commit (위), gh-pages 에도 force-orphan push.
        # 검증 후 Phase B 에서 fetch URL 마이그레이션, Phase C 에서 main commit 제거.
        if: always()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.VERITY_DATA_PAT }}
