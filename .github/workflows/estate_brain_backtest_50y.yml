# ESTATE Brain V0.3 50y Backtest — BIS 1975~ + KOSIS-KB 1986~ cycle 검증 (월 1회)
# 50년 시계열 = 매일 갱신 X. 매월 2일 KST 11:00 (estate_brain_backtest 1일 +1일).

name: ESTATE Brain Backtest 50y

on:
  schedule:
    - cron: '0 2 2 * *'  # 매월 2일 KST 11:00 (= UTC 02:00)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: estate-brain-backtest-50y
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run 50y backtest builder
        env:
          # KOSIS API key (KB 원자료 1986~ mirror — 권역 분리 필요 시 등록)
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          # BIS = FRED csv 직접 fetch (무인증 무료)
        run: |
          python -m api.builders.estate_brain_backtest_50y_builder

      - name: Commit data/estate_brain_backtest_50y.json
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/estate_brain_backtest_50y.json
          DATE_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "🔍 ESTATE Brain Backtest 50y ${DATE_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          echo "::warning::push 5회 실패 — 다음 cron 에서 재시도"

      - name: Publish to gh-pages
        if: success()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.VERITY_DATA_PAT }}
