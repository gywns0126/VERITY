name: US Stock Names KO (한글명)

# 2026-07-09 신설 — US 종목 한글 검색("테라울프") 지원. 네이버 종목 autocomplete 로 티커별 한글명 수집.
# universe_search 빌더가 name_ko 주입 → 한글 검색 매칭. 이름 안정적 → 저빈도(주 1회) + 증분 캐시.

on:
  schedule:
    - cron: '0 18 * * 0'   # 매주 일요일 KST 03:00 (신규 상장·개명 반영)
  workflow_dispatch:
    inputs:
      max_seconds:
        description: 'wall-clock budget (기본 3000s = 50분)'
        required: false
        default: '3000'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: verity-us-names-ko
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install deps
        # 🚨 `pip install requests` 만으로는 죽는다 — `python -m api.collectors.<x>` 는 패키지
        #    __init__.py 를 실행하고, 그게 bonddata → api/config.py → `from dotenv import load_dotenv`
        #    를 끌어온다. 첫 실행(2026-07-12)이 ModuleNotFoundError: No module named 'dotenv' 로 실패.
        #    2026-05-27 cockpit dotenv 사고와 동일 패턴 (워크플로 7축 audit 6번: pip/requirements 정합).
        #    다른 워크플로 관례도 전부 -r requirements.txt (cache-dependency-path 도 이미 그걸 가리킴).
        run: pip install -r requirements.txt

      - name: Collect US Korean names (Naver autocomplete)
        env:
          US_NAMES_KO_MAX_SECONDS: ${{ github.event.inputs.max_seconds || '3000' }}
        run: python -m api.collectors.us_stock_names_ko

      - name: Commit data/us_stock_names_ko.json
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/us_stock_names_ko.json
          if git diff --staged --quiet; then echo "no changes"; exit 0; fi
          git commit -m "🈁 us_stock_names_ko $(TZ=Asia/Seoul date +%Y-%m-%d)"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then break; fi
            sleep $((i * 5))
          done
