# Universe Scan — universe scan + stock_filter 별도 cron (2026-05-10).
# project_phase_2a_ramp_up_audit + macro_collect 패턴 확장:
#   - 5/10 5000 stage workflow_dispatch = 35분 universe + 75분 STEP 3+ = 110분 SIGTERM
#   - universe + filter 분리 → daily_analysis 는 candidate jsonl 만 읽음
#
# 결과: data/universe_candidates.json (collected_at + candidates + diagnostics)
# daily_analysis_full STEP 2 = snapshot 읽기 fast path (max_stale 2h) + inline fallback.

name: Universe Scan

on:
  schedule:
    # 평일 KST 15:30 (= UTC 06:30 월~금). KR 시장 마감 (15:30) 직후 = 당일 종가 반영.
    # daily_analysis_full (KST 16:07) 보다 37분 일찍 시작 → snapshot 1분 stale 로 fast path hit.
    - cron: '30 6 * * 1-5'
  # 2026-05-18 — Vercel Cron fallback (GitHub Actions silent miss 회피).
  # 5/16~5/18 정기 cron 3일 silent miss 학습. dispatch_pulse.py 시각 매핑 → repository_dispatch.
  repository_dispatch:
    types:
      - universe_scan
  workflow_dispatch:
    inputs:
      verity_mode:
        description: 'VERITY_MODE (LLM 호출 정책). manual default = staging.'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - prod
          - dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write   # main 에 universe_candidates.json commit

# WARN-17: data/* 쓰기 워크플로 단일 그룹 직렬화 (verity-data-write).
# daily_analysis_full 와 같은 group → 큐잉 (충돌 회피).
concurrency:
  group: verity-data-write
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # universe 5000 + cooler 누적 35분 → 안전 마진 25분

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 현재 날짜 (KST)
        id: date
        run: echo "today=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: KIS 토큰 캐시 복원
        # 2026-05-16 추가 — universe_scan 도 KIS env 사용 → cache 없으면 신규 발급 source 됨.
        # 다른 KIS workflow 와 동일 v2 키 (2026-05-16 stale chain 깨려고 prefix bump).
        uses: actions/cache@v4
        with:
          path: ~/.cache/verity_kis_token.json
          key: kis-token-v2-${{ runner.os }}-${{ steps.date.outputs.today }}
          restore-keys: |
            kis-token-v2-${{ runner.os }}-

      - name: Run universe scan + filter
        env:
          # 2026-05-11: VERITY_MODE — schedule cron = prod, manual dispatch = input.
          VERITY_MODE: ${{ github.event.inputs.verity_mode || 'prod' }}
          # 2026-05-27 fix — ANALYSIS_MODE 설정 (mode=unknown 13 entry 발생 원인).
          # stock_filter._log_w1_runtime mode = ANALYSIS_MODE env. 미설정 시 default "unknown".
          # 5/10 universe_scan 분리 commit 후 누락 잔재. 설정 후 jsonl mode=universe_scan 정합.
          ANALYSIS_MODE: universe_scan
          # ramp-up stage 환경변수 (daily_analysis_full 와 동일 secret 재사용)
          UNIVERSE_RAMP_UP_STAGE: ${{ secrets.UNIVERSE_RAMP_UP_STAGE }}
          # 2026-05-18 PM 옵션 C 결정 — wide_scan SHADOW 진입 (5000→1000 coarse filter).
          # default DISABLED → SHADOW 명시. PRODUCTION 게이트 = 자기 산식 8/10 + 학술 N≥30.
          WIDE_SCAN_MODE: ${{ vars.WIDE_SCAN_MODE || 'SHADOW' }}
          # KIS / DART / KRX (stock_filter 가 사용)
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY || vars.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET || vars.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO || vars.KIS_ACCOUNT_NO }}
          KIS_OPENAPI_BASE_URL: ${{ secrets.KIS_OPENAPI_BASE_URL || vars.KIS_OPENAPI_BASE_URL }}
          DART_API_KEY: ${{ secrets.DART_API_KEY || vars.DART_API_KEY }}
          # 2026-05-11 fix: KR universe build (KRX K1) 가 KRX_API_KEY env 사용. 둘 다 설정 (daily_analysis_full 정합).
          KRX_API_KEY: ${{ secrets.KRX_API_KEY || vars.KRX_API_KEY }}
          KRX_OPENAPI_KEY: ${{ secrets.KRX_API_KEY || vars.KRX_API_KEY }}
          # Telegram (FATAL 시 alert)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m api.builders.universe_scan_builder

      - name: Commit data/universe_candidates.json
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/universe_candidates.json
          # 🚨 KIS lock 파일도 함께 — universe_scan 도 KIS env 사용 → 발급 가능 source.
          # 1일 1토큰 룰 propagation 위해 필수 (2026-05-16 폭주 사고 후 추가).
          git add data/.kis_issued_date.txt 2>/dev/null || true
          # P0-2b fix (2026-05-16): runtime_load_log.jsonl 누락 — 574538fd (5/12) commit 가
          # daily_analysis inline 5000 scan 제거 → universe_scan 이 유일한 logging caller.
          # universe_scan.yml 의 git add 가 specific file 만 추가돼서 jsonl 누락 → entry 0건/5일.
          # daily_analysis* 는 git add data/ 라 자동 포함. universe_scan 만 결함.
          git add data/metadata/runtime_load_log.jsonl 2>/dev/null || true
          # wide_scan_log.jsonl 도 함께 — SHADOW 누적 데이터 (5/11 1 entry / 6일 = propagation 결함).
          # 65 거래일 SHADOW 검증 게이트 (TG-1, 8월 말 PRODUCTION) 정합 위해 누적 필수.
          # 5번째 같은 패턴 (KIS lock / fred_health / runtime_load 후속).
          git add data/wide_scan_log.jsonl 2>/dev/null || true
          # data_pipeline_health.json — write_data_pipeline_health() 편승 (universe_scan_builder.py).
          # 5/10 신설 후 7일 stale (commit 1건만, autostash 로 영영 stash 후 drop).
          # 6번째 RULE 4 violation 학습 (CLAUDE.md 5번째 명시 후 재발) — 2026-05-17 audit.
          # SystemHealthBar 의 DATA PIPELINE (Phase 2-B) 섹션 source 정합.
          git add data/metadata/data_pipeline_health.json 2>/dev/null || true
          # shadow_funnel_picks.json — wide_scan e_factor_rank 100-name (emission 입력).
          # RULE 4: specific git add 라 신규 파일 누락 시 silent 손실 (위 5~6차 사고 패턴).
          # generate_predictions(daily_analysis_full)가 다음 cron 에서 읽어 source=shadow_funnel.v0 예측 발생.
          git add data/metadata/shadow_funnel_picks.json 2>/dev/null || true
          # multibagger_watch.jsonl — wide_scan 가 KR 소형주 텐버거 후보 로깅 (2026-06-09 PM 결정 B).
          # 로깅 전용 trail (결정 0, active gate 2026-09). RULE 4: 신규 파일 git add 누락 방지.
          git add data/metadata/multibagger_watch.jsonl 2>/dev/null || true
          git diff --staged --quiet && echo "no changes" && exit 0
          TIME_KST=$(TZ=Asia/Seoul date +%Y-%m-%dT%H:%M)
          git commit -m "🔍 universe_candidates ${TIME_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            # 2026-05-11 fix: --autostash 추가 — universe_scan 동안 builder 가 data_pipeline_health.json
            # 같은 파일 부수적 update 시 unstaged changes 발생. rebase 가 fail 함.
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          echo "::warning::push 5회 실패 — 다음 cron 에서 재시도"
