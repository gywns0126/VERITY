# ESTATE SubscriptionCalendar — 청약홈 분양정보 수집 + 5종 event 분해 + calendar 산출 (Tier 2 D)
# 흐름:
#   1) subscription_collector — odcloud ApplyhomeInfoDetailSvc/v1/getAPTLttotPblancDetail
#   2) calendar_builder — row 1건 → 5종 event 분해 + by_month/by_region/upcoming_high_impact
# publish-data action 이 gh-pages 로 송출. vercel-api /api/estate/subscription-calendar read-through.
#
# 빈도 결정:
#   평일 KST 10:30 (= UTC 01:30 월~금).
#   hero(09:00) + change_feed(09:30) + policy_shock(10:00) +30분 시차 패턴.
#   사유: 청약 공고 발표 빈도 = 0~5건/일. 일 1회 충분.
#
# 입력 게이트 (feedback_scheduled_routine_input_first):
#   data.go.kr 15098547 활용신청 필요 (user_action_queue 박힘).
#   미신청 상태에서 cron 발화 = collector 503 + 명시 로그 + events=[] 반환. silent skip X.

name: ESTATE SubscriptionCalendar

on:
  schedule:
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: estate-subscription-calendar
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build subscription calendar
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
        run: |
          python -m api.builders.estate_subscription_calendar_builder

      - name: Commit data/estate_subscription_calendar.json
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/estate_subscription_calendar.json
          DATE_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "📅 ESTATE SubscriptionCalendar ${DATE_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          echo "::warning::push 5회 실패 — 다음 cron 에서 재시도"

      - name: Publish to gh-pages
        if: success()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.VERITY_DATA_PAT }}
