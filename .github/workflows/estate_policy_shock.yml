# ESTATE PolicyShockTimeline — 정책 archive 누적 + 충격 timeline 산출
# 흐름:
#   1) archive builder: 72h 정책 read → jsonl append (id dedup) + 90d 초과 prune
#   2) shock builder:   archive 30d read → impact_score 산출 → estate_policy_shock.json
# publish-data action 이 gh-pages 로 송출. vercel-api /api/estate/policy-shock read-through.
#
# 빈도 결정:
#   평일 KST 10:00 (= UTC 01:00 월~금). hero_briefing(09:00) + change_feed(09:30) +30분 시차 패턴.
#   사유: data.go.kr 24h 정책 평균 0~1건. 일 1회 archive append 충분.

name: ESTATE PolicyShockTimeline

on:
  schedule:
    # 평일 KST 10:05 (= UTC 01:05 월~금). estate_brain.yml (01:00) 와 5분 시차 — 동시
    # publish-data action 충돌 회피 (2026-05-16 cron concurrency audit).
    - cron: '5 1 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: estate-policy-shock
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Append policy archive (72h window)
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m api.builders.estate_policy_archive_builder

      - name: Rebuild policy shock timeline (30d lookback)
        run: |
          python -m api.builders.estate_policy_shock_builder

      - name: Commit archive + shock
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/estate_policy_archive.jsonl data/estate_policy_shock.json
          DATE_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "📐 ESTATE PolicyShock ${DATE_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          echo "::warning::push 5회 실패 — 다음 cron 에서 재시도"

      - name: Publish to gh-pages
        if: success()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.VERITY_DATA_PAT }}
