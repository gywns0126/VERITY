# DART KR 분기재무 백필 (분기추이 viz 토대)
#
# stock_report_public universe(~1700) × 2016~2025 × Q1/반기/3Q/연간(40기간, BACKFILL_YEARS=10) 분기재무비율
# (ROA/부채비율/유동비율/매출총이익률/자산회전율) → data/dart_quarterly_snapshots.jsonl 누적.
# 소비처(별도): 슬림 public 빌더 + PublicStockReport '분기추이' 미니차트 (데이터 충분 후).
# DART only — KIS 무관(RULE 1). proven fetcher(dart_fundamentals, reprt_code 인자화) 재사용. resume+quota-cap.
#
# 저빈도 자가완주 cron: KST 20:00(UTC 11) 일 1회 drip. run당 1,500 units(=DART call) 상한.
#    off-peak gap — catalyst pulse(UTC 0-9)·catalyst backfill(평일 14,18/주말 0,8,16 UTC)·dart_batch(일 13 UTC) 모두 회피.
#    멱등(체크포인트 resume) → 완주 ~46일(68K units=1712×40, 1500/day), MIN_QUARTERS=4 게이트 ~5일. done 후 자동 no-op(DART call 0).
#    (2026-07-01 10년 확대 정합: BACKFILL_YEARS 5→10, years 변경 시 진도 자동 재init. 가속=run_units 상향, DART 20K/일 여유.)
#    쿼터 안전망 = dart_fail_rate>5% P0 monitor. 압박 시 run_units 하향. schedule 은 default 브랜치서만 발화 → 머지 후 활성.
#
# 7축 audit: env=DART_API_KEY+UNIVERSE+KRX(universe builder) · push=data/ commit(RULE2 ignoreCommand skip) ·
#    concurrency=verity-data-write(형제 backfill 직렬화, cancel-in-progress:false=큐잉) · cron=일1회 off-peak(쿼터 회피) ·
#    KIS=0(RULE1) · pip=requirements · N=2=머지 후 manual dispatch(N=1)+익일 scheduled(N=2) 실 audit 의무.

name: DART Quarterly Backfill (KR 분기재무)

on:
  schedule:
    # KST 20:00 = UTC 11:00. 일 1회 저빈도 drip (위 7축 audit 참조). scheduled event = run_units default 1500.
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      run_units:
        description: '이번 run 진행 상한 (종목·단위, 쿼터 분할)'
        required: false
        default: '1500'

permissions:
  contents: write

concurrency:
  group: verity-data-write
  cancel-in-progress: false

jobs:
  quarterly-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 분기재무 백필 (DART, resume + run-cap)
        id: bf
        timeout-minutes: 55
        continue-on-error: true
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY || vars.DART_API_KEY }}
          UNIVERSE_RAMP_UP_STAGE: ${{ secrets.UNIVERSE_RAMP_UP_STAGE }}
          KRX_OPENAPI_KEY: ${{ secrets.KRX_OPENAPI_KEY || vars.KRX_OPENAPI_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY || vars.KRX_API_KEY }}
          DART_BACKFILL_RUN_UNITS: ${{ github.event.inputs.run_units || '8000' }}   # 2026-07-17 1500→8000: H2 순이익 정본 재수집(최근 5기간 ~7,895 units)을 1 off-peak scheduled run 완주용. 완주 후 no-op(신 분기만 재수집, bounded)이라 상시 안전.
        run: |
          set +e
          python -m api.builders.dart_quarterly_backfill_builder
          echo "RC=$?"

      - name: Commit + push (변경 시만)
        if: always()   # 잘려도 부분 진척(progress+jsonl) 보존
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          # RULE 4: 신 체크포인트 파일(.dart_quarterly_backfill_progress.json) + 누적 jsonl 둘 다 명시 add
          git add data/.dart_quarterly_backfill_progress.json data/dart_quarterly_snapshots.jsonl 2>/dev/null || true
          git diff --staged --quiet && { echo "변경 없음"; exit 0; }
          git commit -m "data(alpha-nest): KR 분기재무 백필 누적 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M') (분기추이)"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase -X theirs origin "$BRANCH" && git push origin "$BRANCH"; then
              echo "pushed"; exit 0
            fi
            echo "push attempt $i failed, retry in $((i*10))s"; sleep $((i*10))
          done
          echo "::error::5회 push 실패"; exit 1
