# 배리티 데일리 콘텐츠 생성 (인스타 포스팅용)
# scripts/generate_daily_content.py — 4 카테고리 카드 PNG + 캡션 + 해시태그
# 출력: data/daily_content/{YYYY-MM-DD}/{macro,sector,micro,news_impact}/
# 빈도: 평일 KST 19:00 (= UTC 10:00). portfolio 17:00 이후 갱신 후 안정화 시점.

name: Daily Content (Instagram)

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: daily-content
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install Pillow

      - name: Generate content (4 카테고리)
        run: |
          python scripts/generate_daily_content.py --category all

      - name: Commit data/daily_content/
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          DATE_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          # data/daily_content/ 는 .gitignore 박혀있음 (대용량 archive 회피 의도) →
          # cron 이 매일 1폴더만 -f 강제추가 (선택적 누적)
          git add -f data/daily_content/${DATE_KST}/
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "📸 daily content ${DATE_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          echo "::warning::push 5회 실패 — 다음 cron 에서 재시도"
