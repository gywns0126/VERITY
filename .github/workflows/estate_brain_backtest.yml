# ESTATE Brain V0 Backtest — 권역 단위 backward 검증 (월 1회)
# 12년 시계열 = 매일 갱신 X. 월 1회 + on-demand dispatch.
# 결과: data/estate_brain_backtest.json → publish-data → gh-pages.

name: ESTATE Brain Backtest

on:
  schedule:
    # 매월 1일 KST 11:00 (= UTC 02:00). estate_brain (10:00) + 1h.
    - cron: '0 2 1 * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: estate-brain-backtest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backtest builder
        env:
          R_ONE_API_KEY: ${{ secrets.R_ONE_API_KEY }}
          REB_API_KEY: ${{ secrets.REB_API_KEY }}
        run: |
          python -m api.builders.estate_brain_backtest_builder

      - name: Commit data/estate_brain_backtest.json
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/estate_brain_backtest.json
          DATE_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "🔍 ESTATE Brain Backtest ${DATE_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          echo "::warning::push 5회 실패 — 다음 cron 에서 재시도"

      - name: Publish to gh-pages
        if: success()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
