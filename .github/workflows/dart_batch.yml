# DART Batch — KR universe 펀더멘털 주 1회 batch (2026-05-10).
# 메모리 결정 7 정합 — DART 갱신 주기 = 주 1회 (FUND-CHANGE 분기 의존).
#
# 배경:
#   main.py:2700 의 DART fetch 가 30 candidates 에만 적용 → wide_scan 5,000 raw 단계
#   미도달. F-Score Δ + ROIC + GP/A trend 정량 불가 (Phase 2-B step e).
#
# 해결:
#   주 1회 (일요일 KST 22:00 = UTC 13:00) KR universe ~2,000 종목 일괄 fetch.
#   universe_scan_builder 가 fast path 로 stock dict attach.

name: DART Batch (KR Fundamentals)

on:
  schedule:
    # 매주 일요일 KST 22:00 (= UTC 13:00 일요일). 주말 KRX 휴장 후 안정.
    - cron: '0 13 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write   # main 에 dart_fundamentals_kr.json commit

concurrency:
  group: verity-data-write
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 2,000 ticker × DART rate limit (max_workers=10) ~ 15-20분

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DART batch
        env:
          UNIVERSE_RAMP_UP_STAGE: ${{ secrets.UNIVERSE_RAMP_UP_STAGE }}
          DART_API_KEY: ${{ secrets.DART_API_KEY || vars.DART_API_KEY }}
          KRX_OPENAPI_KEY: ${{ secrets.KRX_OPENAPI_KEY || vars.KRX_OPENAPI_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY || vars.KRX_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m api.builders.dart_batch_builder
          # 전방 분기 refresh — backfill(과거 일회성)의 leading edge. 당해년도~ 최신 reportable
          # 분기 N=2 재fetch → dart_quarterly_snapshots.jsonl append (새 분기 자동 편입+정정 반영).
          # 실패해도 비차단(P0=연간 build 는 위에서 완료). DART_FORWARD_QUARTERS_N 로 조정.
          python -m api.builders.dart_batch_builder --forward || echo "[dart_batch] forward refresh 실패(비차단)"
          # KR 분기 재무비율 추이 public (dart_quarterly_snapshots.jsonl → dart_quarterly_public.json).
          # 순수 변환·외부호출 0. backfill 완주 전까지 0종목 = graceful no-op (컴포넌트 series<4 자동숨김).
          python -m api.builders.dart_quarterly_public_builder

      - name: Commit data/dart_fundamentals_kr.json
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/dart_fundamentals_kr.json
          # CLAUDE.md RULE 4 정합 — F-Score Δ 시계열 누적 jsonl 도 함께 (2026-05-17).
          # 누락 시 매주 entry 추가돼도 디스크 ephemeral. fscore_delta YoY 산출 불가.
          git add data/dart_quarterly_snapshots.jsonl 2>/dev/null || true
          # KR 분기 추이 public 산출물 (위 dart_quarterly_public_builder). RULE 4 정합.
          git add data/dart_quarterly_public.json 2>/dev/null || true
          # data_pipeline_health.json — write_data_pipeline_health() 편승 (dart_batch_builder.py).
          # CLAUDE.md RULE 4 — 6번째 같은 패턴 (2026-05-17 audit, 5/10 신설 후 7일 stale).
          # SystemHealthBar pipelineUrl source 정합.
          git add data/metadata/data_pipeline_health.json 2>/dev/null || true
          git diff --staged --quiet && echo "no changes" && exit 0
          TIME_KST=$(TZ=Asia/Seoul date +%Y-%m-%dT%H:%M)
          git commit -m "🏛️ dart_fundamentals_kr ${TIME_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          echo "::warning::push 5회 실패 — 다음 cron 에서 재시도"
