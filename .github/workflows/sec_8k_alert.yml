name: SEC 8-K Daily Alert (US15)

# 2026-05-16 신설 — US15 종목 SEC 8-K 신규 filing 매일 detect + Telegram critical alert.
# US 시장 마감 (16:00 ET = 21:00 UTC EDT) 후 약 9.5h 마진 → KST 06:30 = UTC 21:30 cron.
# 8-K 는 종가 후 ~수시간 안에 filing 흔함. KST 06:30 이면 충분.
# 비용: SEC EDGAR free + yfinance free + Telegram only.

on:
  schedule:
    # 매일 UTC 21:30 = KST 06:30 (US 시장 종가 후 9.5h)
    - cron: '30 21 * * *'
  workflow_dispatch:
    inputs:
      tickers:
        description: 'comma-separated tickers (비우면 US15)'
        required: false
        default: ''
        type: string
      reset_cache:
        description: 'cache 초기화 (첫 run 또는 재초기화)'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: verity-sec-8k
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect SEC 8-K changes
        env:
          VERITY_MODE: prod
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            ARGS="$ARGS --tickers ${{ github.event.inputs.tickers }}"
          fi
          if [ "${{ github.event.inputs.reset_cache }}" = "true" ]; then
            ARGS="$ARGS --reset-cache"
          fi
          python -m api.intelligence.sec_8k_change_detector $ARGS

      - name: Commit data/sec_8k_cache.json
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/sec_8k_cache.json
          if git diff --staged --quiet; then
            echo "[sec_8k] cache 변화 없음"
            exit 0
          fi
          TODAY_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "📜 sec_8k cache ${TODAY_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          echo "::warning::push 5회 실패 — 다음 cron 재시도"
