name: Cockpit Aggregate (5분 cron)

# 2026-05-27 박힘 — 1인 운영자 관제탑 Phase 0.
# PM=approved 2026-05-23 (plan §Phase 0-d).
# 11 ledger → data/metadata/cockpit_state.json 단일 SoT.
# read-only aggregate. KIS API call 0 (RULE 1 정합).
# data/metadata/ = vercel-api/ 외부 → ignoreCommand auto-skip (RULE 2 정합).

on:
  schedule:
    # 매 5분
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  # 형제 cron 과 다른 group — 5분 cron 직렬화 (cron_health_monitor 와 별)
  # cockpit 은 read-only 라 race 위험 낮음, but commit/push race 회피
  group: verity-cockpit-aggregate
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install minimal deps
        run: pip install --quiet --no-cache-dir requests

      - name: Run cockpit aggregator
        run: python scripts/cockpit_aggregate.py

      - name: Commit cockpit_state.json
        # [[feedback_cron_commit_author_github_match]] gywns0126@gmail.com (GitHub 검증)
        # [[feedback_data_collection_verification_mandatory]] specific path commit
        # [[feedback_brain_evolution_admin_sync]] 🎯 prefix = cron blacklist (brain learn skip)
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/metadata/cockpit_state.json
          if git diff --staged --quiet; then
            echo "[cockpit_aggregate] no changes"
            exit 0
          fi
          NOW_KST=$(TZ=Asia/Seoul date +"%Y-%m-%dT%H:%M")
          git commit -m "🎯 cockpit ${NOW_KST}"
          BRANCH="${{ github.ref_name }}"
          PUSHED=false
          for i in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              PUSHED=true
              break
            fi
            echo "push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::warning::push 3회 실패 — 다음 5분 cron 재시도"
          fi
