# KR 일봉 차트 데이터 (금융위 공공데이터) — 공개 차트 합법 부활.
# 2026-07-04 신설: TradingView KRX 임베드 표시 제한 확인 → 자체 SVG 차트 복원.
#   source = 금융위원회_주식시세정보 (data.go.kr/data/15094808) — "이용허락범위 제한 없음"(재배포 합법).
#   KRX/KIS raw 재배포 컴플라이언스와 무관 (공공데이터 경유). T+1 전일 종가까지.
# 갱신 = 익영업일 13시 이후 → 평일 14:23 KST 1회 (정각 회피 odd minute — GH silent-skip 완화).
# 트래픽 = 2콜/일 (한도 10,000). 의존성 = 순수 stdlib (pip 불필요).
# 7축 audit (2026-07-04): env=PUBLIC_DATA_API_KEY(collector)+VERITY_DATA_PAT/VERCEL_BLOB_TOKEN(publish) 기존 등록 /
#   push=data/ 만(RULE 2 Vercel 무관) / concurrency=전용 group / cron=일1회 / KIS 무관 / pip=0 / RULE 8 N=2 큐.
name: KR Chart Daily (FSC public data)

on:
  schedule:
    # 평일 14:23 KST (= 05:23 UTC) — 금융위 데이터 익영업일 13시 이후 갱신 반영
    - cron: '23 5 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: verity-kr-chart-daily
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # daily 2콜 + 청크 40파일 write + publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 일봉 수집 (금융위 공공데이터 · T+1)
        # 🚨 파일 직접 실행 (module -m 금지) — `-m` 은 api/collectors/__init__.py 를 import
        # → bonddata → api.config → dotenv (pip 필요). 파일 실행 = 순수 stdlib (pip 0, 검증 완료).
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
        run: python api/collectors/fsc_daily_prices.py --mode daily

      - name: 지수 일봉 수집 (금융위 지수시세정보 · T+1)
        # 2026-07-08 신설 — 지수 소스 yfinance(Yahoo, 재배포 법률큐) → 금융위 공공데이터로 청정화.
        # 주식시세(15094808)의 형제 API(15094807), 같은 키·같은 "이용허락범위 제한 없음".
        # 같은 T+1 타이밍이라 이 슬롯 동승. 순수 stdlib (pip 0). 실패해도 차트 발행 무관(|| true).
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
        run: python api/collectors/fsc_index_prices.py --mode daily || echo "지수 수집 실패(무해)"

      - name: Commit data/kr_chart_daily/ + kr_index_daily.json
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/kr_chart_daily/ data/kr_index_daily.json data/hot_stock.json
          if git diff --staged --quiet; then
            echo "[kr_chart_daily] no changes"
            exit 0
          fi
          TODAY_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "📈 kr_chart_daily ${TODAY_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              break
            fi
            echo "push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done

      - name: Blob 업로드 (kr_chart_daily/chunk_XX.json + meta)
        # 2026-07-07 구조 변경 — 공용 publish-data staging 제외, 갱신 시점 Blob 직행.
        # 옛 구조: 28MB 가 모든 publish-data 호출자(price_pulse 5분 주기 포함)에서
        # 재업로드 → price_pulse run 6분 > dispatch 5분 → 큐 취소 연쇄 (ratio 22% FAIL).
        # kr_chart_history.yml 과 동일 패턴 (blob_upload.js 재사용, 1-level 서브디렉토리).
        # 소비자 = PublicLiveChart Blob fetch only (raw.githubusercontent 소비자 0 확인).
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.VERCEL_BLOB_TOKEN }}
        run: |
          if [ -z "$BLOB_READ_WRITE_TOKEN" ]; then
            echo "::error::VERCEL_BLOB_TOKEN 없음"
            exit 1
          fi
          mkdir -p _chart_dist/kr_chart_daily
          cp data/kr_chart_daily/*.json _chart_dist/kr_chart_daily/
          cd .github/actions/publish-data
          npm install --no-save --silent --no-audit --no-fund @vercel/blob@^0.27
          node blob_upload.js "${{ github.workspace }}/_chart_dist"
