name: Price Pulse (1m KR/US 지수 + 보유 + 추천)

# 2026-05-11 사용자 결정: 핵심 가격만 1분 cron 으로 lite 갱신.
# 배경: daily_realtime 5분 cron + 9m45s run = drop 빈번 + 갱신 지연.
# 본 워크플로: main.py 우회 → ~30~60초 run.
# - import: 가벼움 (requests + yfinance lazy + KIS broker lazy)
# - fetch: yahoo batch (지수 7 + US 종목) + KIS get_current_price (KR 직렬)
# - output: data/price_pulse.json (portfolio.json 과 분리, race 없음)
# - Vercel API merge 는 후속

on:
  # 발화 = Vercel Cron 매분 → /api/cron/dispatch_pulse → repository_dispatch 단일 통로.
  # 2026-05-16 5분 KIS 폭주 사고 후 broker cache_only=True 모드 박음 → 신규 발급 절대 불가.
  # 새 토큰 발급 source = kis_token_refresh (KST 23:45) / daily_realtime backup.
  repository_dispatch:
    types: [price_pulse]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  # 별도 그룹 — verity-data-write (daily_analysis 군) / verity-realtime (daily_realtime) 와 격리.
  # cancel-in-progress: false 큐잉. data/price_pulse.json 단일 파일 race 없음.
  group: verity-pulse
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 현재 날짜 (KST)
        id: date
        run: echo "today=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: KIS 토큰 캐시 복원
        # daily_realtime / daily_analysis 가 발급한 token 재사용 (KIS 일 1회 발급 정책 정합)
        uses: actions/cache@v4
        with:
          path: ~/.cache/verity_kis_token.json
          key: kis-token-v2-${{ runner.os }}-${{ steps.date.outputs.today }}
          restore-keys: |
            kis-token-v2-${{ runner.os }}-

      - name: Run price pulse
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_OPENAPI_BASE_URL: ${{ secrets.KIS_OPENAPI_BASE_URL || vars.KIS_OPENAPI_BASE_URL }}
          # 2026-06-03: cache_only consumer 도 Supabase 공유 store read fallback (file cache 날짜-key
          # 버그 우회). read-only — 발급 X (RULE 1). daily_analysis/daily_realtime 와 동일 store.
          KIS_SHARED_TOKEN: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python api/cron/price_pulse.py

      - name: Commit data/price_pulse.json
        id: commit
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/price_pulse.json
          # 🚨 lock 파일도 함께 — broker 가 발급 1일 1회 ABSOLUTE 룰 위반 안 하도록 propagation 보장.
          # cache_only=True 라 신규 발급 안 하지만 defense in depth.
          git add data/.kis_issued_date.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "[pulse] no changes"
            echo "changed=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          TIME_KST=$(TZ=Asia/Seoul date +%H:%M)
          git commit -m "💓 price_pulse ${TIME_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              echo "changed=1" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "[pulse] push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          echo "changed=0" >> $GITHUB_OUTPUT
          echo "::warning::[pulse] push 5회 실패 — 다음 cron 에서 재시도"

      - name: Publish price_pulse.json to gh-pages
        if: steps.commit.outputs.changed == '1'
        # gh-pages 갱신 — 프론트가 raw.githubusercontent gh-pages 에서 fetch
        # force_orphan publish 라 다른 워크플로 산출물도 main HEAD 기준 함께 재발행됨 (race 안전)
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.VERITY_DATA_PAT }}
          blob_token: ${{ secrets.VERCEL_BLOB_TOKEN }}
