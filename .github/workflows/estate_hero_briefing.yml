# ESTATE HeroBriefing — 정책 수집 + 분류 + AI 한줄평 + LANDEX 폴백 빌더 (P2 Step 6)
# Vercel serverless 5s timeout 우회용 — GitHub Actions 가 정책 수집·LLM 호출·JSON 산출 담당.
# 결과: data/estate_hero_briefing.json 갱신 → publish-data action 으로 gh-pages publish.
# 통합 vercel-api 의 /api/estate/hero-briefing 이 그 JSON 을 read-through.
#
# 빈도 결정 (사용자 결정 1, 2026-05-02):
#   원안 평일 KST 08/12/18 (3회/일) → 신안 평일 KST 09:00 1회/일 + 수동 dispatch.
#   사유: 24h 정책 평균 0~1건 (Step 1.2 실증). 3회 cron 중복 무의미.

name: ESTATE HeroBriefing

on:
  schedule:
    # 평일 KST 09:00 (= UTC 00:00 월~금). 결정 1 그대로.
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

# Node.js 24 강제 — 2026-06-02 GitHub Node 20 deprecation 대비 (2026-05-07)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write   # gh-pages publish 위해 필요 (publish-data action)

concurrency:
  group: estate-hero-briefing
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run builder
        env:
          # narrative AI (sonnet-4)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 정책 수집 인증 (data.go.kr 정공법 — policy_collector v2, commit 0beb222).
          # 누락 시 collect_policies() = silent 0건 → LANDEX 폴백만 동작 (cry wolf 위험).
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          # LANDEX 폴백 (Supabase fetch) — ESTATE 표준 패턴: service_role (RLS bypass)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # LANDEX dashboard deep link prefix (HeroBriefing 카드의 source_url)
          LANDEX_DASHBOARD_BASE_URL: ${{ secrets.LANDEX_DASHBOARD_BASE_URL }}
        run: |
          # 빌더 entry — exit 0 = JSON 갱신, exit 1 = 전체 실패 (이전 파일 유지, T21)
          python -m api.builders.estate_hero_briefing_builder

      - name: Commit data/estate_hero_briefing.json
        # publish-data force_orphan 충돌 가드 — 다른 cron 의 publish 가 ESTATE 산출물
        # 덮어쓰지 않도록 main 에 영속화 (r_one_freshness_probe 패턴 정합).
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/estate_hero_briefing.json
          DATE_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "📡 ESTATE HeroBriefing ${DATE_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          echo "::warning::push 5회 실패 — 다음 cron 에서 재시도"

      - name: Publish to gh-pages
        # 빌더가 성공한 경우에만 publish (T21 — 부분 실패도 새 JSON 이 작성됐으므로 publish OK)
        if: success()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
