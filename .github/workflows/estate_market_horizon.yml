# ESTATE MarketHorizon — 5축 종합 verdict synthesizer weekly 빌더.
#
# 5축 endpoint 호출 (vercel-api public) → weighted verdict 산출.
# 의존: estate_policy_narrative + estate_sector_pulse (둘 다 월요일 KST 06:30 / 07:00).
# 따라서 이 cron 은 그 후 = 월요일 KST 08:00 = UTC 23:00 일요일.
#
# 비용: 무료 (vercel-api public endpoint 5회 호출).

name: ESTATE MarketHorizon Synthesizer (weekly)

on:
  schedule:
    # 매주 일요일 UTC 23:00 = 월요일 KST 08:00 (policy 06:30 / sector 07:00 다음)
    - cron: '0 23 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: estate-market-horizon
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run synthesizer
        env:
          # 명시적 endpoint base (default 박혀있지만 명시가 안전)
          ESTATE_API_BASE: ${{ vars.ESTATE_API_BASE || 'https://project-yw131.vercel.app' }}
        run: |
          python -m api.builders.estate_market_horizon_builder

      - name: Commit data/estate_market_horizon.json
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/estate_market_horizon.json
          if git diff --staged --quiet; then
            echo "[market_horizon] no changes"
            exit 0
          fi
          DATE_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "🧭 ESTATE MarketHorizon weekly ${DATE_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          echo "::warning::push 5회 실패 — 다음 cron 재시도"

      - name: Publish to gh-pages
        if: success()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.VERITY_DATA_PAT }}
