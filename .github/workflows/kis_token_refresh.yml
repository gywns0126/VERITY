name: KIS Token Refresh (00:00 KST)

on:
  # 2026-05-13 재활성화: 24h minimum interval 가드 (broker.authenticate) + 시각 기반 lock.
  # 2026-05-29 23h → 24h 정정 (5/27+5/28 사고). 단점: 23:45 cron = 23h57m < 24h → 매일 skip.
  # daily_realtime backup 으로 fallback. backup 사고 시 token 만료 위험 (사용자 동의 5/29).
  # KST 23:45 발급 — 자정 트랜지션 15분 전 + dispatch_pulse 슬롯 (minute % 30 == 0)
  # 회피 (minute=45 → daily_realtime 동시 발화 없음). 5/3 + 5/13 race 모두 차단.
  schedule:
    - cron: '45 14 * * *'  # UTC 14:45 = KST 23:45 (daily_realtime 슬롯 회피)
  workflow_dispatch:

# Node.js 24 강제 — 2026-06-02 GitHub Node 20 deprecation 대비 (2026-05-07)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # 🚨 RULE 1 — GH Actions 단일 발급원 (PM 2026-05-31). 발급 직후 Supabase publish (Railway/Vercel 소비).
  KIS_SHARED_TOKEN: "1"

permissions:
  contents: write  # data/.kis_issued_date.txt (daily lock) commit/push 용

concurrency:
  # KIS 토큰 중복 발급 방지 — daily_analysis / daily_analysis_full / bond_etf /
  # export_trade 와 동일 group 공유. 타 workflow 가 KIS API 호출 중일 때
  # 대기 → 완료 후 실행. 자정 갱신은 보통 다른 cron 과 겹치지 않지만
  # 드물게 지연 실행 시 중복 토큰 발급 원천 차단.
  group: verity-data-write
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: pip install requests

      - name: 현재 날짜 (KST)
        id: date
        run: echo "today=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: KIS 토큰 캐시 복원
        uses: actions/cache@v4
        with:
          path: ~/.cache/verity_kis_token.json
          key: kis-token-v2-${{ runner.os }}-${{ steps.date.outputs.today }}
          restore-keys: |
            kis-token-v2-${{ runner.os }}-

      - name: KIS 토큰 갱신
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_OPENAPI_BASE_URL: ${{ secrets.KIS_OPENAPI_BASE_URL || vars.KIS_OPENAPI_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python - <<'PYEOF'
          import sys, os
          sys.path.insert(0, os.getcwd())
          from api.trading.kis_broker import KISBroker

          broker = KISBroker()
          if not broker.is_configured:
              print("KIS 미설정 (KIS_APP_KEY/SECRET 없음) — 건너뜀")
              sys.exit(0)

          # lock 사전 체크 — 시각 기반 (2026-05-13 자정 race fix 후 변경).
          # 🚨 2026-05-22 RULE 1 정정: 6h → 23h. KIS = 1일 1토큰(발급 간격 최소 24h).
          # 🚨 2026-05-29 RULE 1 재정정: 23h → 24h. 사고 5/27 + 5/28 매일 알림.
          # 5/27 00:08 preflight + 23:08 preflight = 23h 0m → 23h 가드 통과 → 2번째 발급.
          # 5/28 22:11 발급 = 다시 ~23h interval → 사용자 카톡 알림 1건 (RULE 1 P0).
          # 24h 가드 = preflight/refresh 어느 쪽이든 정책 (발급 간격 최소 24h) 정합.
          # 단점: 23:45 cron 박힌 23h57m < 24h → skip → daily_realtime backup 의존.
          # PM 결정 5/29 옵션 A (가드만 fix). cron schedule 변경 보류.
          if broker._is_recently_issued(hours=24):
              print("lock — 24h 이내 이미 발급됨. KIS API 호출 skip (1일 1토큰 가드).")
              sys.exit(0)

          # force_refresh=True — broker 내부 24h 가드 bypass. 위 workflow-level 24h 가드가
          # 1일 1토큰 보장 (당일 미발급 시에만 여기 도달 = backup 발급).
          token = broker.authenticate(force_refresh=True)
          print(f"KIS 토큰 갱신 완료: {token[:8]}***")
          PYEOF

      - name: daily lock 파일 commit & push
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/.kis_issued_date.txt || true
          if git diff --staged --quiet; then
            echo "daily lock 파일 변화 없음 — 오늘 이미 발급된 상태"
            exit 0
          fi
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "🔐 KIS daily lock ${TODAY}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3; do
            if git push origin "$BRANCH"; then
              echo "✓ daily lock push 성공"
              exit 0
            fi
            echo "push 실패 (attempt $i) — rebase 후 재시도"
            git pull --rebase origin "$BRANCH" || git merge --abort || true
          done
          echo "::error::daily lock push 3회 실패"
          exit 1
