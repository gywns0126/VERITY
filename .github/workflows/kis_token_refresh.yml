name: KIS Token Refresh (00:00 KST)

on:
  schedule:
    # KST 00:05 매일 (UTC 15:05) — 자정 직후 토큰 1회 갱신
    - cron: '5 15 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kis-token-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: pip install requests

      - name: 현재 날짜 (KST)
        id: date
        run: echo "today=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: KIS 토큰 캐시 복원
        uses: actions/cache@v4
        with:
          path: ~/.cache/verity_kis_token.json
          key: kis-token-${{ runner.os }}-${{ steps.date.outputs.today }}
          restore-keys: |
            kis-token-${{ runner.os }}-

      - name: KIS 토큰 갱신
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_OPENAPI_BASE_URL: ${{ secrets.KIS_OPENAPI_BASE_URL || vars.KIS_OPENAPI_BASE_URL }}
        run: |
          python - <<'PYEOF'
          import sys, os
          sys.path.insert(0, os.getcwd())
          from api.trading.kis_broker import KISBroker

          broker = KISBroker()
          if not broker.is_configured:
              print("KIS 미설정 (KIS_APP_KEY/SECRET 없음) — 건너뜀")
              sys.exit(0)

          token = broker.authenticate(force_refresh=True)
          print(f"KIS 토큰 갱신 완료: {token[:8]}***")
          PYEOF
