name: KIS Token Refresh (00:00 KST)

on:
  # 2026-05-03 KIS 정책 위반 사고 후 schedule 일시 비활성화 (24h quiet).
  # 원인: Stock Analysis Pipeline 가 5/3 KST 00:50 첫 발급 후 daily lock commit/push
  # 누락 → 7분 후 KIS Token Refresh 가 stale lock(5/2) + force_refresh=True 로 두
  # 번째 발급. 6시간 정책 위반. 재활성화 조건: broker 6h-minimum-interval 가드 +
  # Stock Analysis yml daily lock commit step 보강 검증 후.
  # schedule:
  #   - cron: '5 15 * * *'
  workflow_dispatch:

permissions:
  contents: write  # data/.kis_issued_date.txt (daily lock) commit/push 용

concurrency:
  # KIS 토큰 중복 발급 방지 — daily_analysis / daily_analysis_full / bond_etf /
  # export_trade 와 동일 group 공유. 타 workflow 가 KIS API 호출 중일 때
  # 대기 → 완료 후 실행. 자정 갱신은 보통 다른 cron 과 겹치지 않지만
  # 드물게 지연 실행 시 중복 토큰 발급 원천 차단.
  group: verity-data-write
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: pip install requests

      - name: 현재 날짜 (KST)
        id: date
        run: echo "today=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: KIS 토큰 캐시 복원
        uses: actions/cache@v4
        with:
          path: ~/.cache/verity_kis_token.json
          key: kis-token-${{ runner.os }}-${{ steps.date.outputs.today }}
          restore-keys: |
            kis-token-${{ runner.os }}-

      - name: KIS 토큰 갱신
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_OPENAPI_BASE_URL: ${{ secrets.KIS_OPENAPI_BASE_URL || vars.KIS_OPENAPI_BASE_URL }}
        run: |
          python - <<'PYEOF'
          import sys, os
          sys.path.insert(0, os.getcwd())
          from api.trading.kis_broker import KISBroker

          broker = KISBroker()
          if not broker.is_configured:
              print("KIS 미설정 (KIS_APP_KEY/SECRET 없음) — 건너뜀")
              sys.exit(0)

          # daily lock 사전 체크 — 발급 호출 *전* (2026-05-03 사고 후 추가).
          # _is_issued_today() True 면 이미 오늘 발급됨 → API 호출 자체 skip.
          if broker._is_issued_today():
              print("daily lock — 오늘 이미 발급됨. KIS API 호출 skip (정책 가드).")
              sys.exit(0)

          # force_refresh=False — broker 가 cache/disk/lock 가드 모두 통과 시에만 발급.
          # broker 측 6h-minimum-interval 가드 (api/trading/kis_broker.py 2.5) 가
          # cache stale 시점에도 정책 위반 차단.
          token = broker.authenticate(force_refresh=False)
          print(f"KIS 토큰 갱신 완료: {token[:8]}***")
          PYEOF

      - name: daily lock 파일 commit & push
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/.kis_issued_date.txt || true
          if git diff --staged --quiet; then
            echo "daily lock 파일 변화 없음 — 오늘 이미 발급된 상태"
            exit 0
          fi
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "🔐 KIS daily lock ${TODAY}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3; do
            if git push origin "$BRANCH"; then
              echo "✓ daily lock push 성공"
              exit 0
            fi
            echo "push 실패 (attempt $i) — rebase 후 재시도"
            git pull --rebase origin "$BRANCH" || git merge --abort || true
          done
          echo "::error::daily lock push 3회 실패"
          exit 1
