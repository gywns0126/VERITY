# 수출·HS 매핑 파이프라인 — 일 1회 (무역통계는 월 단위, Gemini/관세청 호출 절약)
name: Export Trade Pipeline (Daily)

on:
  schedule:
    # 월~금 08:15 UTC ≈ KST 17:15 — daily_analysis UTC 08:30 트리거보다 15분 먼저 완료되도록 이동
    # (export_trade 가 trade_analysis.json 을 쓴 뒤 daily_analysis 가 읽는 순서 보장)
    - cron: "15 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # WARN-17: data/* 를 쓰는 모든 워크플로를 단일 그룹으로 직렬화
  group: verity-data-write
  cancel-in-progress: false

jobs:
  export-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run export trade pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY || vars.KRX_API_KEY }}
          KRX_OPENAPI_KEY: ${{ secrets.KRX_API_KEY || vars.KRX_API_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
          CUSTOMS_TRADE_BASE_CNTY: ${{ vars.CUSTOMS_TRADE_BASE_CNTY || 'ZZ' }}
          CUSTOMS_TRADE_SURGE_COUNTRIES: ${{ vars.CUSTOMS_TRADE_SURGE_COUNTRIES || 'CN,US,VN' }}
          CUSTOMS_TRADE_SURGE_MOM_PCT: ${{ vars.CUSTOMS_TRADE_SURGE_MOM_PCT || '15' }}
          PYTHONUNBUFFERED: "1"
        run: python -m api.workflows.export_trade_pipeline

      - name: Commit trade JSON
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/trade_analysis.json data/hscode_mapping.json
          HOUR_KST=$(TZ=Asia/Seoul date +%H:%M)
          git diff --staged --quiet || git commit -m "📦 수출·HS 매핑 갱신 $(TZ=Asia/Seoul date +%Y-%m-%d) ${HOUR_KST}"
          BRANCH="${{ github.ref_name }}"
          PUSHED=false
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            git merge --abort 2>/dev/null || true
            if git pull --rebase -X theirs origin "$BRANCH" && git push origin "$BRANCH"; then
              PUSHED=true
              break
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::error::All 5 push attempts failed"
            exit 1
          fi

      - name: Publish hot data to gh-pages (Sprint 11 D-1)
        if: always()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
