# Cron Health Monitor — 매일 KST 18:00 (UTC 09:00) cron 결과 자동 점검.
# 5/11 평일 schedule 부터 universe_scan + macro_collect 분리 후 첫 검증.
# 영구 자산: 매일 daily_analysis + universe_scan + macro_collect 결과 자동 텔레그램 verdict.
#
# 입력 (feedback_scheduled_routine_input_first 정합):
#   - data/metadata/runtime_load_log.jsonl
#   - data/macro_snapshot.json
#   - data/universe_candidates.json
#   - GitHub API run list (gh CLI)
# 출력: 텔레그램 (bypass_quiet, WARNING/FAIL 시만 default)

name: Cron Health Monitor

on:
  schedule:
    # 2026-05-16 시간당 강화 — KIS 토큰 발급 폭주 detect (5/16 5분 폭주 사고 학습).
    # 매시 정각 (UTC 매시 0분). PASS silent / WARNING / FAIL 만 telegram → spam 없음.
    # KIS lock 24h commit ≥ 2 = WARNING, ≥ 3 = FAIL (1일 1토큰 ABSOLUTE 위반).
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      hours:
        description: 'lookback window (시간)'
        required: false
        default: '24'
        type: string
      always_notify:
        description: 'PASS 도 push (default WARNING/FAIL 만)'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write   # 2026-05-17 Phase 3 — cron_health.jsonl persist main commit (옛 read)
  actions: read    # gh run list 위해

concurrency:
  group: cron-health-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # 2026-05-11 fix: telegram.py 가 api.config import (dotenv 등) 의존. requirements.txt 일괄 설치.
        run: pip install -r requirements.txt

      - name: Run health monitor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_QUIET_HOURS_ENABLED: "0"   # bypass_quiet
        run: |
          HOURS="${{ github.event.inputs.hours || '24' }}"
          ALWAYS="${{ github.event.inputs.always_notify }}"
          ARGS="--hours $HOURS --notify"
          if [ "$ALWAYS" = "true" ]; then
            ARGS="$ARGS --always-notify"
          fi
          python scripts/cron_health_monitor.py $ARGS

      - name: Commit cron_health.jsonl
        # 2026-05-17 Phase 3 audit fix — cron_health_monitor 결과 persist.
        # 옛 구현 = 텔레그램 push 만 + stdout 출력 휘발 → 운영자 과거 trend 추적 불가.
        # 매시 1 commit 박힘 (24/일) — macro_collect 48/일, price_pulse 매분 대비 noise 0.
        # 2026-05-30 fix — monitor step 의도된 exit 1 (P0 시그널) 후 commit step skipped 결함.
        # if: success() || failure() = cancelled 제외 항상 실행 → P0 시그널 후에도 jsonl persist.
        # 5/26~5/30 5일 연속 commit skip (88 run) repo cron_health.jsonl 3일 stale 학습.
        if: success() || failure()
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/metadata/cron_health.jsonl 2>/dev/null || true
          git diff --staged --quiet && echo "no changes" && exit 0
          TIME_KST=$(TZ=Asia/Seoul date +%Y-%m-%dT%H:%M)
          git commit -m "🔔 cron_health ${TIME_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          echo "::warning::push 5회 실패 — 다음 cron 에서 재시도"
