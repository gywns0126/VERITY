name: US Financials (monthly SEC EDGAR XBRL)

# 2026-05-20 신설 — [[project_us_financials_sec_edgar]].
# US15 SEC EDGAR XBRL 표준화 시계열 (8Q + 5Y) + 파생 metrics (margins / FCF / ROE).
# 비용: 무료. SEC rate limit 10 req/sec (안전 마진 0.3s/ticker).
# 빈도: 월 1회 (분기 보고서 발표 후 갱신 — 미국 분기 마감 후 45일 = ~Q2/Q3 5월/8월/11월/2월).

on:
  schedule:
    # 매월 5일 KST 09:00 = UTC 0일 00:00 (분기 보고서 충분히 누적).
    - cron: '0 0 5 * *'
  workflow_dispatch:
    inputs:
      universe:
        description: '유니버스 (sp1500=S&P Composite 1500 기본 / portfolio=추천 US)'
        required: false
        default: 'sp1500'
      ticker:
        description: '단일 ticker (manual test 용 — universe 무시)'
        required: false
        default: ''
      limit:
        description: '최대 종목 수 (cost cap, 0=무제한)'
        required: false
        default: '0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: verity-us-financials
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # sp1500 ~1500종목 SEC fetch(~125분) + Blob 업로드. GH 6h 한도 내·public 무료. (단일 ticker/portfolio 는 수분)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build US universe cache + market caps (yfinance 1패스)
        # 재무 빌더 앞에 실행. fast_info 1패스로 (a) us_market_caps.json(Lynch size) +
        # (b) data/cache/universe_us.json(market_cap+거래대금 → universe_scan US 소스, 국장 parity).
        # sp1500 universe 일 때만. [[project_us_financials_sec_edgar]] (a)/(parity).
        continue-on-error: true
        run: |
          UNIVERSE="${{ github.event.inputs.universe || 'sp1500' }}"
          if [ "$UNIVERSE" = "sp1500" ] && [ -z "${{ github.event.inputs.ticker }}" ]; then
            python scripts/us/build_us_universe_cache.py
          else
            echo "[us_universe] universe=$UNIVERSE / ticker 지정 — skip (portfolio market_cap 사용)"
          fi

      - name: Build US financials snapshots
        run: |
          UNIVERSE="${{ github.event.inputs.universe || 'sp1500' }}"   # cron 기본 = sp1500 (자동 리프레시)
          ARGS="--universe $UNIVERSE"
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            ARGS="--ticker ${{ github.event.inputs.ticker }}"
          fi
          LIMIT="${{ github.event.inputs.limit || '0' }}"
          if [ -n "$LIMIT" ] && [ "$LIMIT" != "0" ]; then
            ARGS="$ARGS --limit $LIMIT"
          fi
          python -m api.builders.us_financials_builder $ARGS

      - name: 미장 종목 리포트 public-safe 빌드
        # us_financials/_summary → RULE7 allowlist → data/us_stock_report_public.json (PublicStockReport 재사용)
        continue-on-error: true
        run: python -m api.builders.us_stock_report_public_builder

      - name: 미장 분기 비율 추이 public 빌드
        # us_financials/{TK} series_quarterly → 분기 비율(부채/ROA/유동/매출총이익률) → data/us_quarterly_public.json (PublicQuarterlyTrend 재사용)
        # 순수 변환(외부호출 0). RULE 7 = 계산된 사실 비율만, 점수 0.
        continue-on-error: true
        run: python -m api.builders.us_quarterly_public_builder

      - name: Setup Node (Blob 업로드용)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: per-ticker → Vercel Blob 직업로드 (1500, git-bloat 회피)
        # data/us_financials/*.json (per-ticker 시계열 87MB, gitignore=git 미커밋) → Blob us_financials/<TICKER>.json.
        # 엔드포인트 us_financials.py SOURCE_BASE_FALLBACK = blob/us_financials → deep 카드(USFinancialsCard) 1500 fetch.
        # git 은 _summary + us_stock_report(light) 만 (아래 commit). per-ticker = Blob 단일 소스.
        continue-on-error: true
        env:
          VERCEL_BLOB_TOKEN: ${{ secrets.VERCEL_BLOB_TOKEN }}
        run: |
          npm install @vercel/blob --no-save
          node scripts/us/upload_us_financials_blob.js

      - name: Commit data/us_financials/
        # [[feedback_cron_commit_author_github_match]] gywns0126@gmail.com (GitHub 검증).
        # [[feedback_data_collection_verification_mandatory]] specific path commit.
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/us_financials/ data/us_stock_report_public.json data/us_quarterly_public.json data/us_market_caps.json data/cache/universe_us.json data/cross_gics_us.json
          if git diff --staged --quiet; then
            echo "[us_financials] no changes"
            exit 0
          fi
          TODAY_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "💵 us_financials ${TODAY_KST}"
          BRANCH="${{ github.ref_name }}"
          PUSHED=false
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              PUSHED=true
              break
            fi
            echo "push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::warning::push 5회 실패 — 다음 cron 재시도 (publish-data 는 main HEAD 기준 진행)"
          fi

      - name: Publish to VERITY-data + Vercel Blob
        # 2026-05-26 확정 — private 전환 sweep 보완 ([[project_us_financials_sec_edgar]]).
        # publish-data action 이 light 산출(us_stock_report/_summary) → VERITY-data + Blob 발행.
        # per-ticker 1500 = 위 직업로드 스텝(Blob)이 담당. endpoint /api/verity/us-financials = Blob 페치.
        if: always()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.VERITY_DATA_PAT }}
          blob_token: ${{ secrets.VERCEL_BLOB_TOKEN }}
