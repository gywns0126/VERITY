name: US Financials (monthly SEC EDGAR XBRL)

# 2026-05-20 신설 — [[project_us_financials_sec_edgar]].
# US15 SEC EDGAR XBRL 표준화 시계열 (8Q + 5Y) + 파생 metrics (margins / FCF / ROE).
# 비용: 무료. SEC rate limit 10 req/sec (안전 마진 0.3s/ticker).
# 빈도: 월 1회 (분기 보고서 발표 후 갱신 — 미국 분기 마감 후 45일 = ~Q2/Q3 5월/8월/11월/2월).

on:
  schedule:
    # 매월 5일 KST 09:00 = UTC 0일 00:00 (분기 보고서 충분히 누적).
    - cron: '0 0 5 * *'
  workflow_dispatch:
    inputs:
      ticker:
        description: '단일 ticker (manual test 용, 비우면 portfolio.json US 전체)'
        required: false
        default: ''
      limit:
        description: '최대 종목 수 (cost cap, 0=무제한)'
        required: false
        default: '0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: verity-us-financials
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # US15 × ~5초 = 75초, 안전 마진 ~19분

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build US financials snapshots
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            ARGS="--ticker ${{ github.event.inputs.ticker }}"
          fi
          LIMIT="${{ github.event.inputs.limit || '0' }}"
          if [ -n "$LIMIT" ] && [ "$LIMIT" != "0" ]; then
            ARGS="$ARGS --limit $LIMIT"
          fi
          python -m api.builders.us_financials_builder $ARGS

      - name: Commit data/us_financials/
        # [[feedback_cron_commit_author_github_match]] gywns0126@gmail.com (GitHub 검증).
        # [[feedback_data_collection_verification_mandatory]] specific path commit.
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/us_financials/
          if git diff --staged --quiet; then
            echo "[us_financials] no changes"
            exit 0
          fi
          TODAY_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "💵 us_financials ${TODAY_KST}"
          BRANCH="${{ github.ref_name }}"
          PUSHED=false
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              PUSHED=true
              break
            fi
            echo "push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::warning::push 5회 실패 — 다음 cron 재시도 (publish-data 는 main HEAD 기준 진행)"
          fi

      - name: Publish to VERITY-data + Vercel Blob
        # 2026-05-26 박힘 — private 전환 sweep 보완 ([[project_us_financials_sec_edgar]]).
        # publish-data action 이 _public_dist/us_financials/ stage → VERITY-data + Blob 박음.
        # endpoint /api/verity/us-financials = Blob source 페치. 503 fix path.
        if: always()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.VERITY_DATA_PAT }}
          blob_token: ${{ secrets.VERCEL_BLOB_TOKEN }}
