# ESTATE Brain V0.2 snapshots — 25구 aggregate + V0 watchlist 5단지 산출
# Vercel serverless 5s timeout 우회 — GitHub Actions 가 macro·R-ONE 호출 + estate_brain.compute_estate_brain 산식 담당.
# 결과: data/estate_brain_snapshots.json 갱신 → publish-data action 으로 gh-pages publish.
# vercel-api/api/estate_brain.py 가 ESTATE_BRAIN_SOURCE_URL 로 read-through.
#
# 빈도 결정:
#   평일 KST 10:00 (= UTC 01:00 월~금). estate_change_feed (09:30) + 30분.
#   사유: R-ONE 주간지수 (목요일 갱신), ECOS 월간 금리, KOSIS 연간 소득 — 일 1회 충분.

name: ESTATE Brain Snapshots

on:
  schedule:
    # 평일 KST 10:00 (= UTC 01:00 월~금). estate_change_feed 09:30 + 30분.
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write   # gh-pages publish + main commit 위해 필요

concurrency:
  group: estate-brain
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run builder
        env:
          # ECOS 한국 macro (기준금리·국고채 10y) — 박혀있는 경우 진짜 호출
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          # KOSIS 권역 중위소득 (V1 게이트 — 박힌 경우 진짜 호출)
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          KOSIS_INCOME_STAT_ID: ${{ secrets.KOSIS_INCOME_STAT_ID }}
          # R-ONE 매매·미분양 (이미 박힘) + 전세 (2026-05-08 박힘)
          R_ONE_API_KEY: ${{ secrets.R_ONE_API_KEY }}
          REB_API_KEY: ${{ secrets.REB_API_KEY }}
          REB_STAT_WEEKLY_JEONSE: ${{ secrets.REB_STAT_WEEKLY_JEONSE }}
          # 매매가격대비 전세가격 = 월간(MM)만 존재 (R-ONE 사양 실측 2026-05-08)
          REB_STAT_MONTHLY_JEONSE_RATIO: ${{ secrets.REB_STAT_MONTHLY_JEONSE_RATIO }}
          REB_STAT_WEEKLY_JEONSE_RATIO: ${{ secrets.REB_STAT_WEEKLY_JEONSE_RATIO }}  # 하위호환 fallback
          # Supabase service role — user_watch_complexes union + estate_alerts insert
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m api.builders.estate_brain_builder

      - name: Commit data/estate_brain_snapshots.json
        # publish-data force_orphan 충돌 가드 — 빌더 산출물 main 영속화 (project_gh_pages_disabled 룰).
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/estate_brain_snapshots.json
          DATE_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "🧠 ESTATE Brain ${DATE_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          echo "::warning::push 5회 실패 — 다음 cron 에서 재시도"

      - name: Publish to gh-pages
        if: success()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
