# ESTATE ChangeFeed — 정책 수집 → 카테고리 분류 → ChangeFeed schema 산출 (P2 wire)
# Vercel serverless 5s timeout 우회 — GitHub Actions 가 LLM 호출·JSON 산출 담당.
# 결과: data/estate_change_feed.json 갱신 → publish-data action 으로 gh-pages publish.
# 통합 vercel-api 의 /api/estate/change-feed 가 read-through.
#
# 빈도 결정:
#   평일 KST 09:30 (= UTC 00:30 월~금). hero_briefing 09:00 + 30분 시차 — concurrency 충돌 회피.
#   사유: data.go.kr 24h 정책 평균 0~1건. 일 1회 충분 (hero_briefing 결정 1 정합).

name: ESTATE ChangeFeed

on:
  schedule:
    # 평일 KST 09:30 (= UTC 00:30 월~금). hero_briefing(09:00) +30분.
    - cron: '30 0 * * 1-5'
  workflow_dispatch:

# Node.js 24 강제 — 2026-06-02 GitHub Node 20 deprecation 대비 (2026-05-07)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write   # gh-pages publish 위해 필요 (publish-data action)

concurrency:
  group: estate-change-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run builder
        env:
          # 정책 수집 인증 (data.go.kr — policy_collector v2). 누락 시 silent 0건 → items=[]
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          # classifier 2차 LLM (claude-haiku-4-5-20251001 — T17). 1차 키워드 종결 시 호출 X
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m api.builders.estate_change_feed_builder

      - name: Commit data/estate_change_feed.json
        # publish-data force_orphan 충돌 가드 — 다른 cron 의 publish 가 ESTATE 산출물
        # 덮어쓰지 않도록 main 에 영속화 (r_one_freshness_probe 패턴 정합).
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/estate_change_feed.json
          DATE_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "📡 ESTATE ChangeFeed ${DATE_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          echo "::warning::push 5회 실패 — 다음 cron 에서 재시도"

      - name: Publish to gh-pages
        if: success()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
