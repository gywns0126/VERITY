# ESTATE Policy Narrative — 주 1회 한국 부동산 정책+시장 종합 brief.
# Perplexity Sonar Pro + 한국 부동산 권위 도메인 whitelist 활용.
# PolicyPulse SECTION 4 ("WEEKLY BRIEF · 7D") 의 데이터 source.
#
# 빈도: 주 1회 (월요일 KST 06:30 = UTC 21:30 일요일).
#   - equity_research_brief 가 같은 월요일 KST 06:00 박혀있어 30분 어긋남 (rate limit / commit race 회피).
#   - 한국 부동산 시장은 평일 09:00 개장이므로 주 시작 전 brief 도착 정합.
#
# 비용: ~$0.04/주 = ~$0.16/월 (project_claude_budget_guard 외 budget).

name: ESTATE Policy Narrative (weekly)

on:
  schedule:
    # 매주 일요일 UTC 21:30 = 월요일 KST 06:30
    - cron: '30 21 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write   # main 커밋 + gh-pages publish

concurrency:
  # 자체 group — KIS / verity-equity-brief / estate-hero-briefing 와 격리.
  group: estate-policy-narrative
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # 1회 Perplexity 호출 ~30s, 안전 마진

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run builder
        env:
          # VERITY_MODE=prod — default 'dev' 면 api.mocks 가 mock 반환.
          VERITY_MODE: prod
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PERPLEXITY_MODEL: ${{ vars.PERPLEXITY_MODEL || 'sonar-pro' }}
        run: |
          python -m api.builders.estate_policy_narrative_builder

      - name: Commit data/estate_policy_narrative.json
        # builder 가 자기 산출물을 main 에 commit 의무 (project_gh_pages_disabled 룰).
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/estate_policy_narrative.json
          if git diff --staged --quiet; then
            echo "[policy_narrative] no changes"
            exit 0
          fi
          DATE_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "📰 ESTATE Policy Narrative weekly ${DATE_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          echo "::warning::push 5회 실패 — 다음 cron 재시도"

      - name: Publish to gh-pages
        if: success()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.VERITY_DATA_PAT }}
