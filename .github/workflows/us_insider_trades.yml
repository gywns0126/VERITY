name: US Insider Trades (SEC Form 4)

# 2026-06-22 신설 — [[project_us_financials_sec_edgar]] (b) 후속 / [[feedback_us_expansion_settled_no_relitigate]].
# 美 내부자(임원·이사·10%주주) Form4 거래 = KR insider(DART) 의 美 짝. 공개 US insider 탭.
# 비용: 무료 (SEC EDGAR, UA 연락처만). SEC 10 req/s 준수 + wall-clock budget 자기 제한.
# 전 종목(sp1500 1505) = 일별 rotation + carry-forward (budget 내 슬라이스, 며칠 내 전 커버).

on:
  schedule:
    # 매일 KST 13:00 = UTC 04:00 (daily_analysis_full KST 16:00/06:30 과 비충돌).
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      max_seconds:
        description: 'wall-clock budget (기본 2400s = 40분)'
        required: false
        default: '2400'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: verity-us-insider
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 55  # budget 2400s(40분) + checkout/install/commit 여유. GH 6h 한도 내·public 무료.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build US insider trades (SEC Form 4)
        # 전 종목 rotation + carry-forward. SEC 무료. RULE 7 = 공시 사실만(점수 0).
        env:
          US_INSIDER_MAX_SECONDS: ${{ github.event.inputs.max_seconds || '2400' }}
        run: python -m api.builders.us_insider_trades_public_builder

      - name: Build US short interest (short% / days-to-cover)
        # RULE 7 = 사실만 (점수·추천 0). 수집원 = stock_data.get_short_interest_yf (무료).
        # 소비자 = PublicStockReport usForen.short_interest 카드 (main 에 이미 렌더 존재).
        continue-on-error: true
        run: python -m api.builders.us_short_interest_public_builder

      - name: Build US ETF facts (category / AUM / expense / holdings)
        # RULE 7 = 사실만 (카테고리·순자산·운용사·보수율·구성종목). 소스 = yfinance(무료).
        # 🚨 소비자 = PublicStockReport 의 US_ETF_URL — 2026-07-11 PR #81 이 컴포넌트만 main 에 올리고
        #    데이터·빌더·publish 목록을 두고 와서 us_etf.json 이 Blob 404 → 미장 ETF 패널 파손 +
        #    site_audit RED. 갱신 경로(이 스텝) + publish 등재 + 데이터 3종을 함께 둔다.
        continue-on-error: true
        run: python -m api.builders.us_etf_public_builder

      - name: Commit data/us_insider_trades.json
        # [[feedback_cron_commit_author_github_match]] gywns0126@gmail.com (GitHub 검증).
        # [[feedback_data_collection_verification_mandatory]] specific path commit.
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/us_insider_trades.json
          # short_interest = continue-on-error 스텝 산출. 첫 실행/실패 시 파일 부재 → add 실패로
          # 워크플로가 죽지 않도록 존재할 때만 stage ([[feedback_data_collection_verification_mandatory]]).
          for f in data/us_short_interest.json data/us_short_interest_cache.json \
                   data/us_etf.json data/us_etf_cache.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done
          if git diff --staged --quiet; then
            echo "[us_insider] no changes"
            exit 0
          fi
          TODAY_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "🕵️ us_insider_trades ${TODAY_KST}"
          BRANCH="${{ github.ref_name }}"
          PUSHED=false
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              PUSHED=true
              break
            fi
            echo "push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::warning::push 5회 실패 — 다음 cron 재시도 (publish-data 는 main HEAD 기준 진행)"
          fi

      - name: Publish to VERITY-data + Vercel Blob
        if: always()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.VERITY_DATA_PAT }}
          blob_token: ${{ secrets.VERCEL_BLOB_TOKEN }}
