name: US Analyst Consensus (yfinance)

# 2026-06-22 신설 — US 후속 (b) us_flow 컨센서스 1500 확대.
# 美 애널리스트 컨센서스(등급·목표가·업사이드) = 터미널 기본 메뉴. yfinance 무료(Finnhub rate 회피).
# 전 종목(sp1500 1505) rotation + carry-forward + budget. RULE 7 = 외부 사실(우리 점수 아님).

on:
  schedule:
    - cron: '0 22 * * 0,2,4'   # 월·수·금 KST 07:00 (UTC 22:00 일·화·목) — 미장 마감 후 갱신분
  workflow_dispatch:
    inputs:
      max_seconds:
        description: 'wall-clock budget (기본 2400s)'
        required: false
        default: '2400'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: verity-us-consensus
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build US analyst consensus (yfinance)
        env:
          US_CONSENSUS_MAX_SECONDS: ${{ github.event.inputs.max_seconds || '2400' }}
        run: python -m api.builders.us_analyst_consensus_public_builder

      - name: Commit data/us_analyst_consensus.json
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/us_analyst_consensus.json
          if git diff --staged --quiet; then
            echo "[us_consensus] no changes"
            exit 0
          fi
          TODAY_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "📊 us_analyst_consensus ${TODAY_KST}"
          BRANCH="${{ github.ref_name }}"
          PUSHED=false
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              PUSHED=true
              break
            fi
            echo "push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::warning::push 5회 실패 — 다음 cron 재시도"
          fi

      - name: Publish to VERITY-data + Vercel Blob
        if: always()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.VERITY_DATA_PAT }}
          blob_token: ${{ secrets.VERCEL_BLOB_TOKEN }}
