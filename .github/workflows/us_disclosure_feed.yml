name: US Disclosure Feed (SEC 8-K)

# 2026-07-09 전용 워크플로 신설 — 기존엔 daily_analysis_full 안에서 무예산 순회로 완주 못 해 2건만 남던 사고.
# 8-K 수시공시 = KR public_disclosure_feed 의 美 짝. 유니버스 = combined(S&P1500 + Polygon 소형주 ~5,313),
# 페이지 회전 + carry-forward + wall-clock budget(1800s) 로 며칠 내 전 커버·누적. SEC 무료(UA 연락처만).

on:
  schedule:
    # 매일 KST 14:00 = UTC 05:00 (us_insider KST 13:00 · daily_analysis_full 비충돌)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      max_seconds:
        description: 'wall-clock budget (기본 1800s = 30분)'
        required: false
        default: '1800'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: verity-us-disclosure
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # budget 1800s(30분) + checkout/install/commit 여유. GH 6h 한도 내·public 무료.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build US disclosure feed (SEC 8-K)
        # combined 유니버스 페이지 회전 + carry-forward. SEC 무료. RULE 7 = 공시 사실만(점수 0).
        env:
          US_DISCLOSURE_MAX_SECONDS: ${{ github.event.inputs.max_seconds || '1800' }}
        run: python -m api.builders.us_disclosure_feed_builder

      - name: Commit data/us_disclosure_feed.json
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/us_disclosure_feed.json
          if git diff --staged --quiet; then
            echo "[us_disclosure_feed] no changes"
            exit 0
          fi
          TODAY_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "🗞️ us_disclosure_feed ${TODAY_KST}"
          BRANCH="${{ github.ref_name }}"
          PUSHED=false
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              PUSHED=true
              break
            fi
            echo "push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::warning::push 5회 실패 — 다음 cron 재시도 (publish-data 는 main HEAD 기준 진행)"
          fi

      - name: Publish to VERITY-data + Vercel Blob
        if: always()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.VERITY_DATA_PAT }}
          blob_token: ${{ secrets.VERCEL_BLOB_TOKEN }}
