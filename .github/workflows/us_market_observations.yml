name: US Market Observations (weekly AAII/NAAIM/FINRA/Form4)

# 2026-06-07 신설 — action_queue d296f423 / 미장 관측 로깅 v0.
# ⚠️ 관측 ONLY — 점수/결정 wire 0. data/observations/us_market_signals.jsonl append.
#   승격(점수화)은 사전등록 통과 후 하나씩 ([[project_observation_scoring_prereg_queue]]).
# 소스(전부 무료, 실호출 검증): AAII 심리 / NAAIM 노출 / FINRA 공매도 / SEC Form4 내부자.
# 빈도: 주1 금 KST 08:00 (= 목 23:00 UTC). AAII·NAAIM 목요일 릴리스 직후 캡처.

on:
  schedule:
    # 매주 금 KST 08:07 = UTC 목 23:07. :07 오프셋 = GH 정각(:00) 고부하 silent-skip 마진
    # ([[feedback_gh_short_cron_silent_skip]]). 주간 저빈도라 분 단위 시점 무관.
    - cron: '7 23 * * 4'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: verity-us-market-observations
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # Form4 ~60 XML × 0.24s + 3소스 + pip ≈ 수분, 안전 마진

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect US market observations
        run: python -m api.collectors.us_market_observations

      - name: Commit data/observations/
        # [[feedback_cron_commit_author_github_match]] gywns0126@gmail.com (GitHub 검증).
        # [[feedback_data_collection_verification_mandatory]] specific path commit (RULE 4).
        # Vercel ignoreCommand: data/ 외부 commit → deploy skip (RULE 2).
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/observations/us_market_signals.jsonl
          if git diff --staged --quiet; then
            echo "[us_market_observations] no changes"
            exit 0
          fi
          TODAY_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "🔭 us_market_observations ${TODAY_KST}"
          BRANCH="${{ github.ref_name }}"
          PUSHED=false
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              PUSHED=true
              break
            fi
            echo "push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::warning::push 5회 실패 — 다음 cron 재시도"
          fi
