# VERITY RSS 스카우트 — 장중 15분 간격 / 장외 30분 간격
# KST = UTC+9 → 장 09:00~15:30 ≈ UTC 00:00~06:30 (월~금)
# 비용 최적화: 장중 5분→15분, 장외 10분→30분 (월 ~3,900회 → ~900회)
name: RSS Scout

on:
  schedule:
    # 장중: 15분 간격 (UTC 00:00~05:45 → KST 09:00~14:45)
    - cron: '0,15,30,45 0-5 * * 1-5'
    # 장 마감 전후 보정: UTC 06:00~06:30 → KST 15:00~15:30
    - cron: '0,15,30 6 * * 1-5'
    # 장외·야간: 30분 간격 (UTC 07~23, 월~금)
    - cron: '0,30 7-23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rss-scout
  cancel-in-progress: true

jobs:
  rss-scout:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSSScout
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
        run: python api/collectors/RSSScout.py

      - name: Commit & push raw_data (news_flash)
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/news_flash.json
          HOUR_KST=$(TZ=Asia/Seoul date +%H:%M)
          git diff --staged --quiet || git commit -m "📡 RSS 속보 갱신 ${HOUR_KST}"
          BRANCH="${{ github.ref_name }}"
          PUSHED=false
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            git merge --abort 2>/dev/null || true
            if git pull --rebase -X theirs origin "$BRANCH" && git push origin "$BRANCH"; then
              PUSHED=true
              break
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::error::All 5 push attempts failed"
            exit 1
          fi
