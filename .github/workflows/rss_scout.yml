# VERITY RSS 스카우트 — 장중 15분 간격 / 장외 30분 간격
# KST = UTC+9 → 장 09:00~15:30 ≈ UTC 00:00~06:30 (월~금)
# 비용 최적화: 장중 5분→15분, 장외 10분→30분 (월 ~3,900회 → ~900회)
name: RSS Scout

on:
  # 2026-07-12: GH schedule(15/30분) silent-skip 으로 실제 간격 1~2.75h > SLA 90분(news_flash P0)
  #   → Vercel Cron dispatch 단일통로 이전(crypto/macro 패턴). dispatch_pulse 가 평일 UTC 0-23 매 30분
  #   rss_scout event repository_dispatch (원 수집 창 = 평일 전시간 보존, KR+US·저녁 뉴스).
  repository_dispatch:
    types: [rss_scout]
  workflow_dispatch:

# Node.js 24 강제 — 2026-06-02 GitHub Node 20 deprecation 대비 (2026-05-07)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: rss-scout
  # 2026-05-16: true → false 변경. 15분 cron 간격 + RSS fetch 가 가끔 long-tail
  # (>15분) 일 때 silent drop 위험. 데이터 무결성 (news_flash.json) > runner 비용.
  cancel-in-progress: false

jobs:
  rss-scout:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSSScout
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
        run: python api/collectors/RSSScout.py

      - name: Commit & push raw_data (news_flash)
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/news_flash.json
          HOUR_KST=$(TZ=Asia/Seoul date +%H:%M)
          git diff --staged --quiet || git commit -m "📡 RSS 속보 갱신 ${HOUR_KST}"
          BRANCH="${{ github.ref_name }}"
          PUSHED=false
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            git merge --abort 2>/dev/null || true
            if git pull --rebase -X theirs origin "$BRANCH" && git push origin "$BRANCH"; then
              PUSHED=true
              break
            fi
            echo "Push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::error::All 5 push attempts failed"
            exit 1
          fi
