name: Stock Analysis Pipeline

on:
  schedule:
    # 24시간 15분 간격, 월~금. main.py가 시각 기반으로 모드 자동 판별
    # 장중(KST 9-15) → realtime | 장마감(KST 15:30-16) → full | 나머지 → quick
    - cron: '*/15 * * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '분석 모드 (realtime / quick / full)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VAMS_INITIAL_CASH: ${{ vars.VAMS_INITIAL_CASH || '10000000' }}
          VAMS_MAX_PER_STOCK: ${{ vars.VAMS_MAX_PER_STOCK || '2000000' }}
          ANALYSIS_MODE: ${{ github.event.inputs.mode || '' }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python api/main.py

      - name: Commit & push results
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/
          HOUR_KST=$(TZ=Asia/Seoul date +%H:%M)
          git diff --staged --quiet || git commit -m "📊 분석 업데이트 $(TZ=Asia/Seoul date +%Y-%m-%d) ${HOUR_KST}"
          git push
