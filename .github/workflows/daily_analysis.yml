name: Stock Analysis Pipeline

on:
  schedule:
    # ── KST 기준 지수·포트 가변 갱신 (GitHub cron = UTC) ──
    # 개장 전 KST 08:30~08:55 (UTC 전일 23:30~23:55, dow 0-4 = 일~목 밤 → 월~금 장 전)
    - cron: '30,35,40,45,50,55 23 * * 0-4'
    # 개장 러시 KST 09:00~09:29 (UTC 00:00~00:29), 매분
    - cron: '0-29 0 * * 1-5'
    # 장중 안정 KST 09:30~09:45 (UTC 00:30~00:45)
    - cron: '30,45 0 * * 1-5'
    # 장중 안정 KST 10:00~14:45 (UTC 01~05시, 15분 간격)
    - cron: '*/15 1-5 * * 1-5'
    # 종가 러시 KST 15:00~15:40 (UTC 06:00~06:40), 매분
    - cron: '0-40 6 * * 1-5'
    # 마감 직후 KST 15:45~15:55 (UTC 06:45~06:55)
    - cron: '45,50,55 6 * * 1-5'
    # 장 마감 full 분석 (KST 16:00 = UTC 07:00), 월~금
    - cron: '0 7 * * 1-5'
    # 장외 (UTC 08~15) quick — 매시 정각, 월~금
    - cron: '0 8-15 * * 1-5'
    # 야간·새벽 경량 realtime 강제 (UTC 08~15, :10~:50), 월~금 — 포트·매크로·꼬리위험만
    - cron: '10,20,30,40,50 8-15 * * 1-5'
    # 장외 (UTC 16~23) quick — 매시 정각, 일~목 (한국 월~금 새벽)
    - cron: '0 16-23 * * 0-4'
    # 야간·새벽 경량 realtime (UTC 16~23, :10~:50), 일~목
    - cron: '10,20,30,40,50 16-23 * * 0-4'
    # 주간 리포트: 매주 토요일 KST 09:00 (UTC 00:00)
    - cron: '0 0 * * 6'
    # 월간 리포트: 매월 1일 KST 09:00 (UTC 00:00)
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '분석 모드 (realtime / quick / full / periodic_weekly / periodic_monthly / periodic_quarterly)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Secrets 미등록 시 빈 문자열로 넘어가며 헬스만 '키 미설정' — Actions 로그에서 원인 확인용
      - name: Check optional trade/patent API secrets
        env:
          KIPRIS_API_KEY: ${{ secrets.KIPRIS_API_KEY || vars.KIPRIS_API_KEY }}
          KIPRIS_ACCESS_KEY: ${{ secrets.KIPRIS_ACCESS_KEY || vars.KIPRIS_ACCESS_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY || vars.PUBLIC_DATA_API_KEY }}
        run: |
          if [ -z "$KIPRIS_API_KEY" ] && [ -z "$KIPRIS_ACCESS_KEY" ]; then
            echo "::warning::KIPRIS: KIPRIS_API_KEY 또는 KIPRIS_ACCESS_KEY 없음 (Actions secrets/variables, 이 저장소에 등록)"
          fi
          if [ -z "$PUBLIC_DATA_API_KEY" ]; then
            echo "::warning::관세청: PUBLIC_DATA_API_KEY 없음 (공공데이터포털 키, secrets 또는 variables 동일 이름)"
          fi
          KRX_API_KEY="${{ secrets.KRX_API_KEY || vars.KRX_API_KEY }}"
          if [ -z "$KRX_API_KEY" ]; then
            echo "::warning::KRX: KRX_API_KEY 없음 — Open API 연동 시 Secrets(또는 Variables)에 등록. 키만으로는 부족하고 API별 이용신청 필요 → docs/KRX_OPEN_API_SETUP.md"
          fi

      - name: Ensure Korean font for PDF
        run: |
          mkdir -p api/reports/fonts
          if [ ! -f api/reports/fonts/NanumGothic.ttf ]; then
            curl -sL -o api/reports/fonts/NanumGothic.ttf \
              "https://github.com/google/fonts/raw/main/ofl/nanumgothic/NanumGothic-Regular.ttf"
            curl -sL -o api/reports/fonts/NanumGothicBold.ttf \
              "https://github.com/google/fonts/raw/main/ofl/nanumgothic/NanumGothic-Bold.ttf"
          fi

      - name: Detect periodic schedule
        id: detect_mode
        run: |
          CRON="${{ github.event.schedule }}"
          MANUAL="${{ github.event.inputs.mode }}"
          DAY_OF_MONTH=$(TZ=Asia/Seoul date +%d)
          if [ -n "$MANUAL" ]; then
            echo "mode=$MANUAL" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "0 0 1 * *" ] || ([ "$CRON" = "0 0 * * 6" ] && [ "$DAY_OF_MONTH" = "01" ]); then
            echo "mode=periodic_monthly" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "0 0 * * 6" ]; then
            echo "mode=periodic_weekly" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "0 7 * * 1-5" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "30,35,40,45,50,55 23 * * 0-4" ] || \
               [ "$CRON" = "0-29 0 * * 1-5" ] || [ "$CRON" = "30,45 0 * * 1-5" ] || \
               [ "$CRON" = "*/15 1-5 * * 1-5" ] || [ "$CRON" = "0-40 6 * * 1-5" ] || \
               [ "$CRON" = "45,50,55 6 * * 1-5" ] || \
               [ "$CRON" = "10,20,30,40,50 8-15 * * 1-5" ] || [ "$CRON" = "10,20,30,40,50 16-23 * * 0-4" ]; then
            echo "mode=realtime" >> $GITHUB_OUTPUT
          else
            echo "mode=" >> $GITHUB_OUTPUT
          fi

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
          VAMS_INITIAL_CASH: ${{ vars.VAMS_INITIAL_CASH || '10000000' }}
          VAMS_MAX_PER_STOCK: ${{ vars.VAMS_MAX_PER_STOCK || '2000000' }}
          ANALYSIS_MODE: ${{ steps.detect_mode.outputs.mode }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          KIPRIS_API_KEY: ${{ secrets.KIPRIS_API_KEY || vars.KIPRIS_API_KEY }}
          KIPRIS_ACCESS_KEY: ${{ secrets.KIPRIS_ACCESS_KEY || vars.KIPRIS_ACCESS_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY || vars.PUBLIC_DATA_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY || vars.KRX_API_KEY }}
          KRX_OPENAPI_KEY: ${{ secrets.KRX_API_KEY || vars.KRX_API_KEY }}
          CLAUDE_TOP_N: ${{ vars.CLAUDE_TOP_N || '5' }}
          CLAUDE_MIN_BRAIN_SCORE: ${{ vars.CLAUDE_MIN_BRAIN_SCORE || '60' }}
          CLAUDE_IN_QUICK: ${{ vars.CLAUDE_IN_QUICK || '1' }}
          CLAUDE_IN_REALTIME: ${{ vars.CLAUDE_IN_REALTIME || '1' }}
          CLAUDE_QUICK_TOP_N: ${{ vars.CLAUDE_QUICK_TOP_N || '3' }}
          CLAUDE_EMERGENCY_THRESHOLD_PCT: ${{ vars.CLAUDE_EMERGENCY_THRESHOLD_PCT || '5.0' }}
          CLAUDE_EMERGENCY_COOLDOWN_MIN: ${{ vars.CLAUDE_EMERGENCY_COOLDOWN_MIN || '120' }}
          CLAUDE_TAIL_RISK_VERIFY: ${{ vars.CLAUDE_TAIL_RISK_VERIFY || '1' }}
          CLAUDE_MORNING_STRATEGY: ${{ vars.CLAUDE_MORNING_STRATEGY || '1' }}
          DEADMAN_FAIL_THRESHOLD: ${{ vars.DEADMAN_FAIL_THRESHOLD || '3' }}
          REPORT_SEND_HOUR_KST: ${{ vars.REPORT_SEND_HOUR_KST || '16' }}
          REPORT_SEND_MINUTE_KST: ${{ vars.REPORT_SEND_MINUTE_KST || '30' }}
          POSTMORTEM_ENABLED: ${{ vars.POSTMORTEM_ENABLED || '1' }}
        run: python api/main.py

      - name: Commit & push results
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/
          HOUR_KST=$(TZ=Asia/Seoul date +%H:%M)
          MODE="${{ steps.detect_mode.outputs.mode }}"
          if [[ "$MODE" == periodic_* ]]; then
            LABEL=$(echo "$MODE" | sed 's/periodic_//')
            git diff --staged --quiet || git commit -m "📋 ${LABEL} 리포트 $(TZ=Asia/Seoul date +%Y-%m-%d)"
          else
            git diff --staged --quiet || git commit -m "📊 분석 업데이트 $(TZ=Asia/Seoul date +%Y-%m-%d) ${HOUR_KST}"
          fi
          git push
