name: Stock Analysis Pipeline

on:
  schedule:
    # 장중 1시간 간격 (KST 9:30, 10:30, 11:30, 12:30, 13:30, 14:30)
    - cron: '30 0-5 * * 1-5'
    # 장 마감 후 최종 분석 (KST 16:00)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VAMS_INITIAL_CASH: ${{ vars.VAMS_INITIAL_CASH || '10000000' }}
          VAMS_MAX_PER_STOCK: ${{ vars.VAMS_MAX_PER_STOCK || '2000000' }}
        run: python api/main.py

      - name: Commit & push results
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/
          HOUR_KST=$(TZ=Asia/Seoul date +%H:%M)
          git diff --staged --quiet || git commit -m "📊 분석 업데이트 $(TZ=Asia/Seoul date +%Y-%m-%d) ${HOUR_KST}"
          git push
