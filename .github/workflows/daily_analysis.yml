name: Stock Analysis Pipeline

on:
  schedule:
    # 장중 (KST 09:00~15:30 ≈ UTC 00:00~06:30) 5분 간격, 월~금
    - cron: '*/5 0-6 * * 1-5'
    # 장 마감 full 분석 (KST 16:00 = UTC 07:00), 월~금
    - cron: '0 7 * * 1-5'
    # 장외 (UTC 08~15) quick — 매시 정각, 월~금
    - cron: '0 8-15 * * 1-5'
    # 야간·새벽 경량 realtime 강제 (UTC 08~15, :10~:50), 월~금 — 포트·매크로·꼬리위험만
    - cron: '10,20,30,40,50 8-15 * * 1-5'
    # 장외 (UTC 16~23) quick — 매시 정각, 일~목 (한국 월~금 새벽)
    - cron: '0 16-23 * * 0-4'
    # 야간·새벽 경량 realtime (UTC 16~23, :10~:50), 일~목
    - cron: '10,20,30,40,50 16-23 * * 0-4'
    # 주간 리포트: 매주 토요일 KST 09:00 (UTC 00:00)
    - cron: '0 0 * * 6'
    # 월간 리포트: 매월 1일 KST 09:00 (UTC 00:00)
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '분석 모드 (realtime / quick / full / periodic_weekly / periodic_monthly / periodic_quarterly)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure Korean font for PDF
        run: |
          mkdir -p api/reports/fonts
          if [ ! -f api/reports/fonts/NanumGothic.ttf ]; then
            curl -sL -o api/reports/fonts/NanumGothic.ttf \
              "https://github.com/google/fonts/raw/main/ofl/nanumgothic/NanumGothic-Regular.ttf"
            curl -sL -o api/reports/fonts/NanumGothicBold.ttf \
              "https://github.com/google/fonts/raw/main/ofl/nanumgothic/NanumGothic-Bold.ttf"
          fi

      - name: Detect periodic schedule
        id: detect_mode
        run: |
          CRON="${{ github.event.schedule }}"
          MANUAL="${{ github.event.inputs.mode }}"
          DAY_OF_MONTH=$(TZ=Asia/Seoul date +%d)
          if [ -n "$MANUAL" ]; then
            echo "mode=$MANUAL" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "0 0 1 * *" ] || ([ "$CRON" = "0 0 * * 6" ] && [ "$DAY_OF_MONTH" = "01" ]); then
            echo "mode=periodic_monthly" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "0 0 * * 6" ]; then
            echo "mode=periodic_weekly" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "0 7 * * 1-5" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          elif [ "$CRON" = "10,20,30,40,50 8-15 * * 1-5" ] || [ "$CRON" = "10,20,30,40,50 16-23 * * 0-4" ]; then
            echo "mode=realtime" >> $GITHUB_OUTPUT
          else
            echo "mode=" >> $GITHUB_OUTPUT
          fi

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
          VAMS_INITIAL_CASH: ${{ vars.VAMS_INITIAL_CASH || '10000000' }}
          VAMS_MAX_PER_STOCK: ${{ vars.VAMS_MAX_PER_STOCK || '2000000' }}
          ANALYSIS_MODE: ${{ steps.detect_mode.outputs.mode }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          KIPRIS_API_KEY: ${{ secrets.KIPRIS_API_KEY }}
          KIPRIS_ACCESS_KEY: ${{ secrets.KIPRIS_ACCESS_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          CLAUDE_TOP_N: ${{ vars.CLAUDE_TOP_N || '5' }}
          CLAUDE_MIN_BRAIN_SCORE: ${{ vars.CLAUDE_MIN_BRAIN_SCORE || '60' }}
          DEADMAN_FAIL_THRESHOLD: ${{ vars.DEADMAN_FAIL_THRESHOLD || '3' }}
          REPORT_SEND_HOUR_KST: ${{ vars.REPORT_SEND_HOUR_KST || '16' }}
          REPORT_SEND_MINUTE_KST: ${{ vars.REPORT_SEND_MINUTE_KST || '30' }}
          POSTMORTEM_ENABLED: ${{ vars.POSTMORTEM_ENABLED || '1' }}
        run: python api/main.py

      - name: Commit & push results
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/
          HOUR_KST=$(TZ=Asia/Seoul date +%H:%M)
          MODE="${{ steps.detect_mode.outputs.mode }}"
          if [[ "$MODE" == periodic_* ]]; then
            LABEL=$(echo "$MODE" | sed 's/periodic_//')
            git diff --staged --quiet || git commit -m "📋 ${LABEL} 리포트 $(TZ=Asia/Seoul date +%Y-%m-%d)"
          else
            git diff --staged --quiet || git commit -m "📊 분석 업데이트 $(TZ=Asia/Seoul date +%Y-%m-%d) ${HOUR_KST}"
          fi
          git push
