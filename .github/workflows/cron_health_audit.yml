name: Cron Health Audit (daily KST 06:00)

# 2026-05-27 박힘 — 메타-monitoring sprint.
# 매일 어제 runtime_load_log.jsonl entry 분포 expected vs actual 비교.
# mismatch 시 telegram alert + cron_health_audit.jsonl 박음.
# [[feedback_data_collection_verification_mandatory]] 정합 — N run 누적 검증 3중 자동화.

on:
  schedule:
    # 매일 KST 06:00 = UTC 21:00 전일
    - cron: '0 21 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: verity-cron-health-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install minimal deps
        run: pip install requests

      - name: Run cron health audit
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
        run: python scripts/cron_health_audit.py

      - name: Commit audit jsonl
        # [[feedback_cron_commit_author_github_match]] gywns0126@gmail.com (GitHub 검증)
        # [[feedback_data_collection_verification_mandatory]] specific path commit
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/metadata/cron_health_audit.jsonl
          if git diff --staged --quiet; then
            echo "[cron_health_audit] no changes"
            exit 0
          fi
          TODAY_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "🩺 cron_health_audit ${TODAY_KST}"
          BRANCH="${{ github.ref_name }}"
          PUSHED=false
          for i in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              PUSHED=true
              break
            fi
            echo "push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::warning::push 3회 실패 — 다음 cron 재시도"
          fi
