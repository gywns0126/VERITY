name: US Major Holdings (SEC 13D/13G)

# 2026-06-22 신설 — [[project_us_financials_sec_edgar]] (b) 후속.
# 美 5%+ 대량보유 SC 13D(행동주의)/13G(수동) = KR 5%+ 대량보유의 美 짝. 공개 forensics.
# 비용: 무료(SEC EDGAR). per-ticker CIK submissions(13D/G cross-index) — Form4 와 동일 패턴.
# 전 종목(sp1500 1505) rotation + carry-forward. 소유=느린 이벤트라 주 3회로 충분.

on:
  schedule:
    # 월·수·금 KST 14:00 = UTC 05:00 (insider 일별 KST13:00·full KST16:00/06:30 과 비충돌).
    - cron: '0 5 * * 1,3,5'
  workflow_dispatch:
    inputs:
      max_seconds:
        description: 'wall-clock budget (기본 2100s = 35분)'
        required: false
        default: '2100'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: verity-us-holdings
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 50  # budget 2100s(35분) + 여유. GH 6h 한도 내·public 무료.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build US major holdings (SEC 13D/13G)
        # 전 종목 rotation + carry-forward. SEC 무료. RULE 7 = 공시 사실만(점수 0).
        env:
          US_HOLDINGS_MAX_SECONDS: ${{ github.event.inputs.max_seconds || '2100' }}
        run: python -m api.builders.us_major_holdings_public_builder

      - name: Commit data/us_major_holdings.json
        # [[feedback_cron_commit_author_github_match]] gywns0126@gmail.com (GitHub 검증).
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "gywns0126@gmail.com"
          git add data/us_major_holdings.json
          if git diff --staged --quiet; then
            echo "[us_holdings] no changes"
            exit 0
          fi
          TODAY_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "🏛️ us_major_holdings ${TODAY_KST}"
          BRANCH="${{ github.ref_name }}"
          PUSHED=false
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              PUSHED=true
              break
            fi
            echo "push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          if [ "$PUSHED" != "true" ]; then
            echo "::warning::push 5회 실패 — 다음 cron 재시도 (publish-data 는 main HEAD 기준)"
          fi

      - name: Publish to VERITY-data + Vercel Blob
        if: always()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.VERITY_DATA_PAT }}
          blob_token: ${{ secrets.VERCEL_BLOB_TOKEN }}
