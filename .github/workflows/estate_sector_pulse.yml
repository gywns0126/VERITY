# ESTATE Sector Pulse — 4섹터 (아파트/오피스/상가/오피스텔) 동향 weekly 빌더.
#
# R-ONE 실측 데이터만 사용 (Perplexity X). 4섹터 × 2 통계 = 8 R-ONE 호출/run.
# 무료 API. CLS_ID 직접 호출로 페이지 수 최소화 (단일 region 시계열만).
#
# 빈도: 주 1회 (월요일 KST 07:00 = UTC 22:00 일요일).
#   - policy_narrative 06:30 / equity_research 06:00 와 30분 어긋남.
#   - R-ONE 갱신: 주간(WK)·월간(MM)·분기(QY) 혼재 → 월 1회면 부족, 주 1회면 정합.

name: ESTATE Sector Pulse (weekly)

on:
  schedule:
    # 매주 일요일 UTC 22:00 = 월요일 KST 07:00
    - cron: '0 22 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  # 자체 group — KIS / verity-equity-brief / estate-* 와 격리.
  group: estate-sector-pulse
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # 8 R-ONE 호출 ~30s 예상, 안전 마진

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run builder
        env:
          # 둘 다 등록되어 있음 (fallback 패턴). project_rone_api_spec 정합.
          R_ONE_API_KEY: ${{ secrets.R_ONE_API_KEY }}
          REB_API_KEY: ${{ secrets.REB_API_KEY }}
        run: |
          python -m api.builders.estate_sector_pulse_builder

      - name: Commit data/estate_sector_pulse.json
        # builder 가 자기 산출물을 main 에 commit 의무 (project_gh_pages_disabled 룰).
        run: |
          git config user.name "AI Stock Bot"
          git config user.email "bot@ansim.ai"
          git add data/estate_sector_pulse.json
          if git diff --staged --quiet; then
            echo "[sector_pulse] no changes"
            exit 0
          fi
          DATE_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git commit -m "📊 ESTATE Sector Pulse weekly ${DATE_KST}"
          BRANCH="${{ github.ref_name }}"
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash -X ours origin "$BRANCH" && git push origin "$BRANCH"; then
              exit 0
            fi
            echo "push attempt $i failed, retrying in $((i * 10))s..."
            sleep $((i * 10))
          done
          echo "::warning::push 5회 실패 — 다음 cron 재시도"

      - name: Publish to gh-pages
        if: success()
        uses: ./.github/actions/publish-data
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.VERITY_DATA_PAT }}
