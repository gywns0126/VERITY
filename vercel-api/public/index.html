<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VERITY API</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e5e5e5; padding: 2rem; max-width: 40rem; margin: 0 auto; line-height: 1.6; }
    h1 { color: #B5FF19; font-size: 1.25rem; }
    code { background: #1a1a1a; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
    a { color: #B5FF19; }
    ul { padding-left: 1.2rem; }
  </style>
</head>
<body>
  <h1>VERITY API</h1>
  <p>이 주소는 <strong>웹 페이지가 아니라 API</strong> 전용입니다. 주소 끝에 <code>/</code> 만 열면 404처럼 보일 수 있지만, 아래 경로는 정상 동작합니다.</p>
  <ul>
    <li><code>POST /api/chat</code> — AI 비서 (JSON: <code>{"question":"..."}</code>)</li>
    <li><code>GET /api/search?q=삼성</code> — 종목 검색</li>
    <li><code>GET /api/stock?...</code> — 단일 종목 분석</li>
  </ul>
  <p>Framer <code>VerityChat</code>의 API URL은 <strong>이 도메인 + <code>/api/chat</code></strong> 로 설정하세요.</p>
</body>
</html>
